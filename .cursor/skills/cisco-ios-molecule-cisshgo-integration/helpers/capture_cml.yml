# ---------- summary ----------
- name: "CML Capture — summary"
  hosts: localhost
  gather_facts: false
  vars:
    module_name: "{{ module_name }}"
    capture_dir: "{{ capture_dir | default('captured') }}"
  tasks:
    - name: "Capture complete"
      ansible.builtin.debug:
        msg: >-
          CML capture finished for {{ module_name }}.
          Artifacts in {{ capture_dir }}/{{ module_name }}/.
          Use -vvvv console output for transcript_map command ordering.
          Use before.txt / after.txt files for cisshgo scenario transcripts.
          Use commands_ordered.txt for reference (but always prefer -vvvv order).
