---
name: "Collection Tests 🧪"

concurrency:
  group: ${{ github.head_ref || github.run_id }}-${{ github.event_name }}
  cancel-in-progress: true

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request_target:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sonar:
    name: SonarCloud
    uses: ansible/ansible-content-actions/.github/workflows/sonarcloud.yaml@main
    with:
      python_version: "3.12"
      galaxy_dependencies: |
        git+https://github.com/ansible-collections/ansible.utils.git
        git+https://github.com/ansible-collections/ansible.netcommon.git
      sonar_scanner_java_opts: "-Xss2m"
    secrets:
      SONAR_TOKEN: ${{ secrets.ANSIBLE_COLLECTIONS_ORG_SONAR_TOKEN_CICD_BOT }}

  changelog:
    uses: ansible/ansible-content-actions/.github/workflows/changelog.yaml@main
    if: github.event_name == 'pull_request_target'

  build-import:
    uses: ansible/ansible-content-actions/.github/workflows/build_import.yaml@main

  ansible-lint:
    uses: ansible/ansible-content-actions/.github/workflows/ansible_lint.yaml@main

  sanity:
    uses: ansible/ansible-content-actions/.github/workflows/sanity.yaml@main

  unit-galaxy:
    uses: ansible/ansible-content-actions/.github/workflows/unit.yaml@main

  unit-source:
    uses: ansible-network/github_actions/.github/workflows/unit_source.yml@main
    with:
      collection_pre_install: >-
        git+https://github.com/ansible-collections/ansible.utils.git
        git+https://github.com/ansible-collections/ansible.netcommon.git

  # ------------------------------------------------------------------
  # Molecule (CISSHGO) — offline scenario tests for resource modules
  # ------------------------------------------------------------------
  molecule-discover:
    name: Discover molecule scenarios
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.list.outputs.scenarios }}
      cisshgo_version: ${{ steps.list.outputs.cisshgo_version }}
    steps:
      - name: Checkout collection
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: List scenarios
        id: list
        shell: bash
        run: |
          set -euo pipefail
          cd extensions/molecule
          mapfile -t dirs < <(
            find . -mindepth 2 -maxdepth 2 -name molecule.yml -printf '%h\n' \
              | sed 's|^\./||' \
              | grep -Ev '^(_shared|cisshgo_fixtures)(/|$)' \
              | sort
          )
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "::error::no molecule scenarios discovered under extensions/molecule"
            exit 1
          fi
          json=$(printf '%s\n' "${dirs[@]}" | jq -R . | jq -sc .)
          echo "scenarios=${json}" >> "$GITHUB_OUTPUT"
          ver=$(tr -d '[:space:]' < cisshgo_fixtures/CISSHGO_VERSION)
          echo "cisshgo_version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Discovered scenarios: ${dirs[*]}"
          echo "Pinned cisshgo: ${ver}"

  molecule:
    name: "molecule (${{ matrix.network_cli_ssh_type }}): ${{ matrix.scenario }}"
    needs: molecule-discover
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.molecule-discover.outputs.scenarios) }}
        network_cli_ssh_type: ["libssh", "paramiko"]
        python-version: ["3.12"]
        ansible-version: ["stable-2.20"]
    env:
      PYTHONHASHSEED: "0"
      ANSIBLE_FORCE_COLOR: "1"
      PY_COLORS: "1"
      CISSHGO_VERSION: ${{ needs.molecule-discover.outputs.cisshgo_version }}
    steps:
      - name: Checkout collection
        uses: actions/checkout@v4
        with:
          path: cisco/ios
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Ansible + molecule + collection deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "https://github.com/ansible/ansible/archive/${{ matrix.ansible-version }}.tar.gz" \
            "molecule>=24.0" \
            "molecule-plugins>=23.5" \
            "ansible-lint" \
            "yamllint" \
            "paramiko" \
            "ansible-pylibssh>=1.1.0" \
            "netaddr" \
            "jmespath"
          ansible-galaxy collection install \
            git+https://github.com/ansible-collections/ansible.utils.git \
            git+https://github.com/ansible-collections/ansible.netcommon.git \
            --force

      - name: Install cisco.ios collection from checkout
        run: ansible-galaxy collection install "${GITHUB_WORKSPACE}/cisco/ios" --force

      - name: Show versions
        run: |
          ansible --version
          molecule --version
          python --version

      - name: Run molecule scenario
        working-directory: cisco/ios/extensions
        run: molecule test -s "${{ matrix.scenario }}" -- -e ansible_network_cli_ssh_type=${{ matrix.network_cli_ssh_type }}

      - name: Upload cisshgo + molecule logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: molecule-${{ matrix.scenario }}-${{ matrix.network_cli_ssh_type }}-logs
          path: |
            /tmp/cisshgo-*.log
            cisco/ios/extensions/molecule/${{ matrix.scenario }}/molecule.log
          if-no-files-found: ignore
          retention-days: 7

  molecule-summary:
    name: Molecule summary
    if: always()
    needs: [molecule-discover, molecule]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any scenario failed
        if: needs.molecule.result != 'success'
        run: |
          echo "::error::one or more molecule scenarios failed"
          exit 1
      - name: All molecule scenarios passed
        run: echo "OK"

  report-status:
    if: ${{ always() && github.event_name == 'schedule' }}
    needs:
      - changelog
      - build-import
      - sanity
      - unit-galaxy
      - ansible-lint
      - unit-source
      - molecule-summary
    uses: ansible/ansible-content-actions/.github/workflows/upload_upstream_results.yaml@main
    with:
      job_context: ${{ toJSON(needs) }}
      component_name: ${{ github.event.repository.name }}
      UPLOAD_USER: ${{ vars.PDE_ORG_RESULTS_AGGREGATOR_UPLOAD_USER }}
      UPLOAD_URL: ${{ vars.PDE_ORG_RESULTS_AGGREGATOR_UPLOAD_URL }}
    secrets:
      UPLOAD_PASSWORD: ${{ secrets.PDE_ORG_RESULTS_UPLOAD_PASSWORD }}

  all_green:
    if: ${{ always() }}
    needs:
      - changelog
      - build-import
      - sanity
      - unit-galaxy
      - ansible-lint
      - sonar
      - report-status
      - molecule-summary
    runs-on: ubuntu-latest
    steps:
      - run: >-
          python -c "assert 'failure' not in
          set([
          '${{ needs.changelog.result }}',
          '${{ needs.build-import.result }}',
          '${{ needs.sanity.result }}',
          '${{ needs.unit-galaxy.result }}',
          '${{ needs.ansible-lint.result }}',
          '${{ needs.unit-source.result }}',
          '${{ needs.sonar.result }}',
          '${{ needs.molecule-summary.result }}'
          ])"
