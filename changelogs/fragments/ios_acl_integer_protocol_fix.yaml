---
bugfixes:
  - ios_acls - Fixed 'int' object has no attribute 'split' error when gathering ACL configurations with TCP entries that have invalid numeric protocol_options. The parser could incorrectly capture trailing numeric values (like precedence or ToS) as TCP protocol_options, causing type mismatches during processing. The fix adds proper type checking to handle dict, int, and string protocol_options before calling string methods (https://github.com/ansible-collections/cisco.ios/issues/XXXXX).
