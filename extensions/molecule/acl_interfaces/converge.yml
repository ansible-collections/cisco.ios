- name: "Ios_acl_interfaces — deleted"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - ../../../tests/integration/targets/ios_acl_interfaces/vars/main.yaml
  tasks:
    - name: "Delete ACL interface configuration"
      register: result
      cisco.ios.ios_acl_interfaces:
        config:
          - name: GigabitEthernet2
        state: deleted

    - name: "Assert deleted commands"
      ansible.builtin.assert:
        that:
          - result.commands | length == 5
          - result.changed == true
          - result.commands | symmetric_difference(deleted.commands) == []

    - name: "Delete ACL interface configuration (idempotent)"
      register: result
      cisco.ios.ios_acl_interfaces:
        config:
          - name: GigabitEthernet2
        state: deleted

    - name: "Assert idempotent"
      ansible.builtin.assert:
        that:
          - result.changed == false

- name: "Ios_acl_interfaces — parsed"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - ../../../tests/integration/targets/ios_acl_interfaces/vars/main.yaml
  tasks:
    - name: "Parse ACL interface configuration from file"
      register: result
      cisco.ios.ios_acl_interfaces:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_acl_interfaces/tests/cli/_parsed.cfg') }}"
        state: parsed

    - name: "Assert parsed matches expected config"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - parsed['config'] | symmetric_difference(result.parsed) == []

- name: "Ios_acl_interfaces — rendered"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - ../../../tests/integration/targets/ios_acl_interfaces/vars/main.yaml
  tasks:
    - name: "Render ACL interface configuration"
      register: result
      cisco.ios.ios_acl_interfaces:
        config:
          - name: GigabitEthernet2
            access_groups:
              - afi: ipv4
                acls:
                  - name: 110
                    direction: in
                  - name: 123
                    direction: out
              - afi: ipv6
                acls:
                  - name: test_v6
                    direction: out
                  - name: temp_v6
                    direction: in
          - name: GigabitEthernet3
            access_groups:
              - afi: ipv4
                acls:
                  - name: 110
                    direction: in
                  - name: 123
                    direction: out
        state: rendered

    - name: "Assert rendered matches expected commands"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.rendered | symmetric_difference(merged.commands) == []

- name: "Ios_acl_interfaces — rtt"
  hosts: ios_rtt
  gather_facts: false
  vars_files:
    - ../../../tests/integration/targets/ios_acl_interfaces/vars/main.yaml
  tasks:
    - name: "RTT — apply base configuration (merged)"
      register: base_config
      cisco.ios.ios_acl_interfaces:
        config:
          - name: GigabitEthernet2
            access_groups:
              - afi: ipv4
                acls:
                  - name: 110
                    direction: in
                  - name: 123
                    direction: out
              - afi: ipv6
                acls:
                  - name: temp_v6
                    direction: in
                  - name: test_v6
                    direction: out
          - name: GigabitEthernet3
            access_groups:
              - afi: ipv4
                acls:
                  - name: 110
                    direction: in
                  - name: 123
                    direction: out
        state: merged

    - name: "RTT — gather ACL interface facts"
      cisco.ios.ios_facts:
        gather_subset:
          - "!all"
          - "!min"
        gather_network_resources:
          - acl_interfaces

    - name: "RTT — apply drift configuration (overridden)"
      register: result
      cisco.ios.ios_acl_interfaces:
        config:
          - name: GigabitEthernet2
            access_groups:
              - afi: ipv4
                acls:
                  - name: 100
                    direction: out
                  - name: 110
                    direction: in
        state: overridden

    - name: "Assert drift commands"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - result.commands | symmetric_difference(overridden.commands) == []

    - name: "RTT — revert using gathered facts (overridden)"
      register: revert
      cisco.ios.ios_acl_interfaces:
        config: "{{ ansible_facts['network_resources']['acl_interfaces'] }}"
        state: overridden

    - name: "Assert revert commands"
      ansible.builtin.assert:
        that:
          - revert.changed == true
          - revert.commands | symmetric_difference(rtt.commands) == []
