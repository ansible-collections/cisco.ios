---
- name: "Ios_acl_interfaces — gathered"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - ../../../tests/integration/targets/ios_acl_interfaces/vars/main.yaml
  tasks:
    - name: "Gather ACL interface facts"
      register: result
      cisco.ios.ios_acl_interfaces:
        config:
        state: gathered

    - name: "Assert gathered matches expected config"
      ansible.builtin.assert:
        that:
          - gathered['config'] | symmetric_difference(result.gathered) == []
          - result['changed'] == false

- name: "Ios_acl_interfaces — merged"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - ../../../tests/integration/targets/ios_acl_interfaces/vars/main.yaml
  tasks:
    - name: "Merge ACL interface configuration"
      register: result
      cisco.ios.ios_acl_interfaces: &merged_config
        config:
          - name: GigabitEthernet2
            access_groups:
              - afi: ipv4
                acls:
                  - name: 110
                    direction: in
                  - name: 123
                    direction: out
              - afi: ipv6
                acls:
                  - name: temp_v6
                    direction: in
                  - name: test_v6
                    direction: out
          - name: GigabitEthernet3
            access_groups:
              - afi: ipv4
                acls:
                  - name: 110
                    direction: in
                  - name: 123
                    direction: out
        state: merged

    - name: "Assert merged commands"
      ansible.builtin.assert:
        that:
          - result.commands | length == 8
          - result.changed == true
          - result.commands | symmetric_difference(merged.commands) == []

    - name: "Merge ACL interface configuration (idempotent)"
      register: result
      cisco.ios.ios_acl_interfaces: *merged_config

    - name: "Assert idempotent"
      ansible.builtin.assert:
        that:
          - result.commands | length == 0
          - result.changed == false

