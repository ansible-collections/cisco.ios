---
- name: "Gather ios_bfd_templates facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bfd_templates/vars/main.yaml"
  tasks:
    - name: "Gather BFD template facts from device"
      cisco.ios.ios_bfd_templates:
        state: gathered
      register: result

    - name: "Assert gathered facts contain expected templates"
      ansible.builtin.assert:
        that:
          - result.gathered | length == 2
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — BFD template config gathered from fixture"

- name: "Merge ios_bfd_templates configuration (merged state)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bfd_templates/vars/main.yaml"
  tasks:
    - name: "Merge BFD template configuration"
      cisco.ios.ios_bfd_templates: &merged_config
        config:
          - name: template1
            hop: single_hop
            interval:
              min_tx: 200
              min_rx: 200
              multiplier: 3
            authentication:
              type: sha_1
              keychain: bfd_keychain
            echo: true
          - name: template2
            hop: multi_hop
            interval:
              min_tx: 500
              min_rx: 500
              multiplier: 5
            dampening:
              half_life_period: 30
              reuse_threshold: 2000
              suppress_threshold: 5000
              max_suppress_time: 54
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - merged['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Merge BFD template configuration — idempotent run"
      cisco.ios.ios_bfd_templates: *merged_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — config applied + idempotency verified"

- name: "Replace ios_bfd_templates configuration (replaced state)"
  hosts: ios_replaced
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bfd_templates/vars/main.yaml"
  tasks:
    - name: "Replace BFD template configuration"
      cisco.ios.ios_bfd_templates: &replaced_config
        config:
          - name: template1
            hop: single_hop
            interval:
              min_tx: 300
              min_rx: 300
              multiplier: 4
            authentication:
              type: sha_1
              keychain: new_keychain
        state: replaced
      register: result

    - name: "Assert replaced commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - replaced['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Replace BFD template configuration — idempotent run"
      cisco.ios.ios_bfd_templates: *replaced_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: replaced state"
      ansible.builtin.debug:
        msg: "replaced state test passed — config replaced + idempotency verified"

- name: "Parse ios_bfd_templates configuration from file (parsed state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bfd_templates/vars/main.yaml"
  tasks:
    - name: "Parse BFD template configuration from file"
      cisco.ios.ios_bfd_templates:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_bfd_templates/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - parsed == result['parsed']
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — BFD template config parsed from _parsed.cfg"

- name: "Render ios_bfd_templates configuration to CLI (rendered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bfd_templates/vars/main.yaml"
  tasks:
    - name: "Render BFD template configuration to CLI commands"
      cisco.ios.ios_bfd_templates:
        config:
          - name: template1
            hop: single_hop
            interval:
              min_tx: 200
              min_rx: 200
              multiplier: 3
            authentication:
              type: sha_1
              keychain: bfd_keychain
            echo: true
          - name: template2
            hop: multi_hop
            interval:
              min_tx: 500
              min_rx: 500
              multiplier: 5
            dampening:
              half_life_period: 30
              reuse_threshold: 2000
              suppress_threshold: 5000
              max_suppress_time: 54
        state: rendered
      register: result

    - name: "Assert rendered commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - rendered['commands'] | symmetric_difference(result['rendered']) | length == 0
        quiet: true

    - name: "PASSED: rendered state"
      ansible.builtin.debug:
        msg: "rendered state test passed — {{ result['rendered'] | length }} CLI commands rendered"
