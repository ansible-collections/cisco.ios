---
# ============================================================================
# Play 1: ios_bgp_address_family — state: gathered
# ============================================================================
- name: "Gather ios_bgp_address_family facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bgp_address_family/vars/main.yaml"
  tasks:
    - name: "Gather BGP AF facts from device"
      cisco.ios.ios_bgp_address_family:
        state: gathered
      register: result

    - name: "Assert gathered facts contain expected address families"
      ansible.builtin.assert:
        that:
          - result.gathered.as_number == "65000"
          - result.gathered.address_family | length >= 4
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — BGP AF config gathered from fixture"

# ============================================================================
# Play 2: ios_bgp_address_family — state: merged (scenario mode, stateful)
# ============================================================================
- name: "Merge ios_bgp_address_family configuration (merged state)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bgp_address_family/vars/main.yaml"
  tasks:
    - name: "Merge BGP AF configuration"
      cisco.ios.ios_bgp_address_family:
        config:
          as_number: "65000"
          address_family:
            - afi: ipv4
              maximum_paths:
                paths: 12
              maximum_secondary_paths:
                eibgp: 2
              redistribute:
                - connected:
                    metric: 10
                - ospf:
                    process_id: 124
                - ospf:
                    process_id: 123
                    match:
                      internal: true
                      externals:
                        type_1: true
                        type_2: true
                      nssa_externals:
                        type_1: true
                        type_2: true
                    metric: 10
                    route_map: bar
                - ospfv3:
                    process_id: 123
                    match:
                      internal: true
                      externals:
                        type_1: true
                        type_2: true
                      nssa_externals:
                        type_1: true
                        type_2: true
                    metric: 10
                    route_map: bar
            - afi: ipv4
              safi: multicast
              aggregate_addresses:
                - address: 192.0.3.1
                  as_confed_set: true
                  netmask: 255.255.255.255
              default_metric: 12
              distance:
                external: 10
                internal: 10
                local: 100
              networks:
                - address: 198.51.111.11
                  mask: 255.255.255.255
                  route_map: test
              table_map:
                filter: true
                name: test_tableMap
            - afi: ipv4
              bgp:
                dampening:
                  max_suppress: 5
                  penalty_half_time: 1
                  reuse_route_val: 10
                  suppress_route_val: 100
                dmzlink_bw: true
                soft_reconfig_backup: true
              safi: mdt
            - afi: ipv6
              aggregate_addresses:
                - address: "2001:DB8:1234::/48"
                  summary_only: true
                - address: "2001:DB8:5678::/48"
                  as_confed_set: true
              redistribute:
                - ospf:
                    process_id: 124
                    match:
                      internal: true
                      externals:
                        type_1: true
                        type_2: true
                      nssa_externals:
                        type_1: true
                        type_2: true
                    metric: 10
                    route_map: bar
                    include_connected: true
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - merged['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Merge BGP AF configuration — idempotent run"
      cisco.ios.ios_bgp_address_family:
        config:
          as_number: "65000"
          address_family:
            - afi: ipv4
              maximum_paths:
                paths: 12
              maximum_secondary_paths:
                eibgp: 2
              redistribute:
                - connected:
                    metric: 10
                - ospf:
                    process_id: 124
                - ospf:
                    process_id: 123
                    match:
                      internal: true
                      externals:
                        type_1: true
                        type_2: true
                      nssa_externals:
                        type_1: true
                        type_2: true
                    metric: 10
                    route_map: bar
                - ospfv3:
                    process_id: 123
                    match:
                      internal: true
                      externals:
                        type_1: true
                        type_2: true
                      nssa_externals:
                        type_1: true
                        type_2: true
                    metric: 10
                    route_map: bar
            - afi: ipv4
              safi: multicast
              aggregate_addresses:
                - address: 192.0.3.1
                  as_confed_set: true
                  netmask: 255.255.255.255
              default_metric: 12
              distance:
                external: 10
                internal: 10
                local: 100
              networks:
                - address: 198.51.111.11
                  mask: 255.255.255.255
                  route_map: test
              table_map:
                filter: true
                name: test_tableMap
            - afi: ipv4
              bgp:
                dampening:
                  max_suppress: 5
                  penalty_half_time: 1
                  reuse_route_val: 10
                  suppress_route_val: 100
                dmzlink_bw: true
                soft_reconfig_backup: true
              safi: mdt
            - afi: ipv6
              aggregate_addresses:
                - address: "2001:DB8:1234::/48"
                  summary_only: true
                - address: "2001:DB8:5678::/48"
                  as_confed_set: true
              redistribute:
                - ospf:
                    process_id: 124
                    match:
                      internal: true
                      externals:
                        type_1: true
                        type_2: true
                      nssa_externals:
                        type_1: true
                        type_2: true
                    metric: 10
                    route_map: bar
                    include_connected: true
        state: merged
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands | length == 0
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — config applied + idempotency verified"

# ============================================================================
# Play 3: ios_bgp_address_family — state: replaced (scenario mode, stateful)
# ============================================================================
- name: "Replace ios_bgp_address_family configuration (replaced state)"
  hosts: ios_replaced
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bgp_address_family/vars/main.yaml"
  tasks:
    - name: "Replace BGP AF configuration"
      cisco.ios.ios_bgp_address_family:
        config:
          as_number: 65000
          address_family:
            - afi: ipv4
              redistribute:
                - ospf:
                    process_id: 123
                    match:
                      externals:
                        type_1: true
                      nssa_externals:
                        type_2: true
                    metric: 15
                    route_map: foo
                - ospfv3:
                    process_id: 123
                    match:
                      internal: true
                      externals:
                        type_2: true
                      nssa_externals:
                        type_1: true
                    metric: 15
                    route_map: foo
            - afi: ipv4
              safi: multicast
              aggregate_addresses:
                - address: 192.0.2.1
                  netmask: 255.255.255.255
                  as_confed_set: true
              bgp:
                aggregate_timer: 10
                slow_peer:
                  - detection:
                      threshold: 150
              neighbors:
                - neighbor_address: "10.1.1.3"
                  activate: true
              networks:
                - address: 198.51.110.10
                  mask: 255.255.255.255
                  backdoor: true
                - address: 192.0.2.1
                  mask: 255.255.255.255
                  route_map: test
            - afi: ipv6
              safi: unicast
              aggregate_addresses:
                - address: "2001:DB8:1234::/48"
                  as_set: true
        state: replaced
      register: result

    - name: "Assert replaced commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - replaced['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Replace BGP AF configuration — idempotent run"
      cisco.ios.ios_bgp_address_family:
        config:
          as_number: 65000
          address_family:
            - afi: ipv4
              redistribute:
                - ospf:
                    process_id: 123
                    match:
                      externals:
                        type_1: true
                      nssa_externals:
                        type_2: true
                    metric: 15
                    route_map: foo
                - ospfv3:
                    process_id: 123
                    match:
                      internal: true
                      externals:
                        type_2: true
                      nssa_externals:
                        type_1: true
                    metric: 15
                    route_map: foo
            - afi: ipv4
              safi: multicast
              aggregate_addresses:
                - address: 192.0.2.1
                  netmask: 255.255.255.255
                  as_confed_set: true
              bgp:
                aggregate_timer: 10
                slow_peer:
                  - detection:
                      threshold: 150
              neighbors:
                - neighbor_address: "10.1.1.3"
                  activate: true
              networks:
                - address: 198.51.110.10
                  mask: 255.255.255.255
                  backdoor: true
                - address: 192.0.2.1
                  mask: 255.255.255.255
                  route_map: test
            - afi: ipv6
              safi: unicast
              aggregate_addresses:
                - address: "2001:DB8:1234::/48"
                  as_set: true
        state: replaced
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: replaced state"
      ansible.builtin.debug:
        msg: "replaced state test passed — config replaced + idempotency verified"

# ============================================================================
# Play 4: ios_bgp_address_family — state: deleted (scenario mode, stateful)
