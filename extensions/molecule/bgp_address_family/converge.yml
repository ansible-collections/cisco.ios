- name: "Delete ios_bgp_address_family configuration (deleted state)"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bgp_address_family/vars/main.yaml"
  tasks:
    - name: "Delete BGP AF configuration"
      cisco.ios.ios_bgp_address_family:
        config:
          as_number: 65000
          address_family:
            - afi: ipv4
              safi: multicast
            - afi: ipv4
              safi: mdt
            - afi: ipv4
            - afi: ipv6
        state: deleted
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - deleted['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Delete BGP AF configuration — idempotent run"
      cisco.ios.ios_bgp_address_family:
        config:
          as_number: 65000
          address_family:
            - afi: ipv4
              safi: multicast
            - afi: ipv4
              safi: mdt
            - afi: ipv4
            - afi: ipv6
        state: deleted
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands | length == 0
        quiet: true

    - name: "PASSED: deleted state"
      ansible.builtin.debug:
        msg: "deleted state test passed — BGP AFs deleted + idempotency verified"

# ============================================================================
# Play 5: ios_bgp_address_family — state: parsed (offline)
# ============================================================================
- name: "Parse ios_bgp_address_family configuration from file (parsed state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bgp_address_family/vars/main.yaml"
  tasks:
    - name: "Parse BGP AF configuration from file"
      cisco.ios.ios_bgp_address_family:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_bgp_address_family/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - parsed['config'] == result['parsed']
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — BGP AF config parsed from _parsed.cfg"

