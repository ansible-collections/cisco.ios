---
# Molecule converge: Run ios_bgp_global integration-style assertions against CISSHGO

# ============================================================================
# Play 1: ios_bgp_global — state: gathered (platform mode, stateless)
# ============================================================================
- name: "Gather ios_bgp_global facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  tasks:
    - name: "Gather BGP global facts from device"
      cisco.ios.ios_bgp_global:
        state: gathered
      register: result

    - name: "Assert gathered facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.gathered.as_number == "65000"
          - result.gathered.bgp.log_neighbor_changes == true
          - result.gathered.bgp.advertise_best_external == true
          - result.gathered.bgp.bestpath_options.compare_routerid == true
          - result.gathered.neighbors | length == 1
          - result.gathered.neighbors[0].neighbor_address == "192.0.2.1"
          - result.gathered.timers.keepalive == 100
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — BGP global config gathered from fixture"

# ============================================================================
# Play 2: ios_bgp_global — state: merged (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Merge ios_bgp_global configuration (merged state)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bgp_global/vars/main.yaml"
  tasks:
    - name: "Merge BGP global configuration"
      cisco.ios.ios_bgp_global: &merged_config
        config:
          as_number: 65000
          bgp:
            default:
              ipv4_unicast: false
              route_target:
                filter: false
            graceful_shutdown:
              neighbors:
                time: 50
              community: 100
              local_preference: 100
            log_neighbor_changes: true
          neighbor:
            - neighbor_address: 198.0.2.1
              description: merge neighbor
              remote_as: 100
              shutdown:
                set: false
          timers:
            keepalive: 100
            holdtime: 200
            min_holdtime: 150
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - merged['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Merge BGP global configuration — idempotent run"
      cisco.ios.ios_bgp_global: *merged_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — config applied + idempotency verified"

# ============================================================================
# Play 3: ios_bgp_global — state: replaced (scenario mode, stateful)
# Note: idempotent check skipped — _set_bgp_defaults causes extra default
# commands that create a non-idempotent cycle for the replaced state.
# ============================================================================
- name: "Replace ios_bgp_global configuration (replaced state)"
  hosts: ios_replaced
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bgp_global/vars/main.yaml"
  tasks:
    - name: "Replace BGP global configuration"
      cisco.ios.ios_bgp_global:
        config:
          as_number: 65000
          bgp:
            advertise_best_external: true
            bestpath_options:
              med:
                confed: true
            log_neighbor_changes: true
            nopeerup_delay_options:
              post_boot: 10
              cold_boot: 20
          neighbor:
            - neighbor_address: 192.0.2.2
              description: replace neighbor
              remote_as: 100
              slow_peer:
                detection:
                  disable: true
          redistribute:
            - connected:
                metric: 10
                set: true
        state: replaced
      register: result

    - name: "Assert replaced commands contain expected entries"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - replaced['commands'] | difference(result['commands']) | length == 0
        quiet: true

    - name: "PASSED: replaced state"
      ansible.builtin.debug:
        msg: "replaced state test passed — config replaced successfully"

# ============================================================================
# Play 4: ios_bgp_global — state: deleted (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Delete ios_bgp_global configuration (deleted state)"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bgp_global/vars/main.yaml"
  tasks:
    - name: "Delete BGP global configuration"
      cisco.ios.ios_bgp_global: &deleted_config
        config:
          as_number: 65000
        state: deleted
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - deleted['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Delete BGP global configuration — idempotent run"
      cisco.ios.ios_bgp_global: *deleted_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: deleted state"
      ansible.builtin.debug:
        msg: "deleted state test passed — BGP config stripped + idempotency verified"

# ============================================================================
# Play 5: ios_bgp_global — state: purged (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Purge ios_bgp_global configuration (purged state)"
  hosts: ios_purged
  gather_facts: false
  tasks:
    - name: "Purge BGP global"
      cisco.ios.ios_bgp_global: &purged_config
        state: purged
      register: result

    - name: "Assert purged commands"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'no router bgp 65000' in result.commands"
          - result.commands | length == 1
        quiet: true

    - name: "Purge BGP global — idempotent run"
      cisco.ios.ios_bgp_global: *purged_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: purged state"
      ansible.builtin.debug:
        msg: "purged state test passed — BGP process removed + idempotency verified"

# ============================================================================
# Play 6: ios_bgp_global — state: parsed (offline; platform host)
# ============================================================================
- name: "Parse ios_bgp_global configuration from file (parsed state)"
  hosts: ios_gathered
  gather_facts: false
  tasks:
    - name: "Parse BGP global configuration from file"
      cisco.ios.ios_bgp_global:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_bgp_global/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.parsed.as_number == "65000"
          - result.parsed.bgp.advertise_best_external == true
          - result.parsed.bgp.bestpath_options.compare_routerid == true
          - result.parsed.bgp.log_neighbor_changes == true
          - result.parsed.neighbors | length == 1
          - result.parsed.neighbors[0].neighbor_address == "198.0.2.1"
          - result.parsed.neighbors[0].route_maps | length == 1
          - result.parsed.timers.keepalive == 100
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — BGP config parsed from _parsed.cfg"

# ============================================================================
# Play 7: ios_bgp_global — state: rendered (offline)
# ============================================================================
- name: "Render ios_bgp_global configuration to CLI (rendered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_bgp_global/vars/main.yaml"
  tasks:
    - name: "Render BGP global configuration to CLI commands"
      cisco.ios.ios_bgp_global:
        config:
          as_number: 65000
          bgp:
            advertise_best_external: true
            bestpath_options:
              compare_routerid: true
            dampening:
              penalty_half_time: 1
              reuse_route_val: 1
              suppress_route_val: 1
              max_suppress: 1
            graceful_shutdown:
              neighbors:
                time: 50
              community: 100
              local_preference: 100
            log_neighbor_changes: true
            nopeerup_delay_options:
              post_boot: 10
          neighbor:
            - neighbor_address: 192.0.2.1
              description: merge neighbor
              remote_as: 100
              aigp:
                send:
                  cost_community:
                    id: 100
                    poi:
                      igp_cost: true
                      transitive: true
          redistribute:
            - connected:
                metric: 10
          timers:
            keepalive: 100
            holdtime: 200
            min_holdtime: 150
        state: rendered
      register: result

    - name: "Assert rendered commands contain expected entries"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - rendered['commands'] | difference(result['rendered']) | length == 0
        quiet: true

    - name: "PASSED: rendered state"
      ansible.builtin.debug:
        msg: "rendered state test passed — {{ result['rendered'] | length }} CLI commands rendered"
