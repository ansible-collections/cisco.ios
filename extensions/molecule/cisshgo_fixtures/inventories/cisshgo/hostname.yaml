---
# CISSHGO device inventory for ios_hostname integration tests
#
# Ports (starting --starting-port, default 10000):
#   10000: platform (gathered, parsed, rendered)
#   10001: scenario ios-hostname-merged
#   10002: scenario ios-hostname-deleted

devices:
  - platform: ios_hostname
    count: 1

  - scenario: ios-hostname-merged
    count: 1

  - scenario: ios-hostname-deleted
    count: 1
