---
# CISSHGO device inventory for ios_lacp Molecule tests.
#
# Stateful scenarios: ios-lacp-merged, ios-lacp-deleted.
# Extra platform rows back the gathered / parsed / rendered hosts on ports
# 10000 and 10003–10004 (see inventory/hosts.yml).
#
# Port map (CISSHGO_PORT default 10000):
#   10000: platform — cisshgo-ios-gathered
#   10001: ios-lacp-merged — cisshgo-ios-merged
#   10002: ios-lacp-deleted — cisshgo-ios-deleted
#   10003: platform — cisshgo-ios-parsed
#   10004: platform — cisshgo-ios-rendered

devices:
  - platform: ios_lacp
    count: 1

  - scenario: ios-lacp-merged
    count: 1

  - scenario: ios-lacp-deleted
    count: 1

  - platform: ios_lacp
    count: 1

  - platform: ios_lacp
    count: 1
