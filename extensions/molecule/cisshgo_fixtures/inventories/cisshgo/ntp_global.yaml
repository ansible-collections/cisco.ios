---
# CISSHGO device inventory for ios_ntp_global integration tests
#
# Ports (starting --starting-port, default 10000):
#   10000: platform (gathered, parsed, rendered)
#   10001: scenario ios-ntp-global-merged
#   10002: scenario ios-ntp-global-overridden
#   10003: scenario ios-ntp-global-deleted
#   10004: scenario ios-ntp-global-rtt

devices:
  - platform: ios_ntp_global
    count: 1

  - scenario: ios-ntp-global-merged
    count: 1

  - scenario: ios-ntp-global-overridden
    count: 1

  - scenario: ios-ntp-global-deleted
    count: 1

  - scenario: ios-ntp-global-rtt
    count: 1
