---
# CISSHGO device inventory for ios_ospfv3 integration tests
#
# Ports (starting --starting-port, default 10000):
#   10000: platform (gathered, parsed, rendered)
#   10001: scenario ios-ospfv3-merged
#   10002: scenario ios-ospfv3-replaced
#   10003: scenario ios-ospfv3-overridden
#   10004: scenario ios-ospfv3-deleted

devices:
  - platform: ios_ospfv3
    count: 1

  - scenario: ios-ospfv3-merged
    count: 1

  - scenario: ios-ospfv3-replaced
    count: 1

  - scenario: ios-ospfv3-overridden
    count: 1

  - scenario: ios-ospfv3-deleted
    count: 1
