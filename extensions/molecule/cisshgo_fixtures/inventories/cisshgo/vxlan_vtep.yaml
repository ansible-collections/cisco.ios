---
# CISSHGO device inventory for ios_vxlan_vtep Molecule tests.
#
# Stateful scenarios: ios-vxlan-vtep-merged, ios-vxlan-vtep-deleted.
# Extra platform rows back the gathered / parsed / rendered hosts on ports
# 10000 and 10003–10004 (see inventory/hosts.yml).
#
# Port map (CISSHGO_PORT default 10000):
#   10000: platform — cisshgo-ios-gathered
#   10001: ios-vxlan-vtep-merged — cisshgo-ios-merged
#   10002: ios-vxlan-vtep-deleted — cisshgo-ios-deleted
#   10003: platform — cisshgo-ios-parsed
#   10004: platform — cisshgo-ios-rendered

devices:
  - platform: ios_vxlan_vtep
    count: 1

  - scenario: ios-vxlan-vtep-merged
    count: 1

  - scenario: ios-vxlan-vtep-deleted
    count: 1

  - platform: ios_vxlan_vtep
    count: 1

  - platform: ios_vxlan_vtep
    count: 1
