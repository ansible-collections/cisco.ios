      - command: "show access-lists | include access list"
        transcript: "transcripts/ios_acls/scenarios/ios-acls-merged/before_empty_acl_names.txt"
      # ── check_mode after (seq 2-3, still empty) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/ios_acls/scenarios/ios-acls-merged/before_empty.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/ios_acls/scenarios/ios-acls-merged/before_empty_acl_names.txt"
      # ── apply before (seq 4-5) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/ios_acls/scenarios/ios-acls-merged/before_empty.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/ios_acls/scenarios/ios-acls-merged/before_empty_acl_names.txt"
      # ── apply: push config (PYTHONHASHSEED=0: ipv4 standard → extended → ipv6)
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-list standard std_acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "10 deny 192.0.2.0 0.0.0.255"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-list extended 110"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "10 deny icmp 192.0.2.0 0.0.0.255 192.0.3.0 0.0.0.255 echo dscp ef ttl eq 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-list extended 123"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "10 deny tcp 198.51.100.0 0.0.0.255 198.51.101.0 0.0.0.255 eq telnet ack tos 12"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "20 deny tcp 192.0.3.0 0.0.0.255 192.0.4.0 0.0.0.255 eq www ack dscp ef ttl lt 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 access-list R1_TRAFFIC"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "deny tcp any eq www any eq telnet ack dscp af11 sequence 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # ── apply after ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/ios_acls/scenarios/ios-acls-merged/after_merged.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/ios_acls/scenarios/ios-acls-merged/after_merged_acl_names.txt"
      # ── idempotent before ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/ios_acls/scenarios/ios-acls-merged/after_merged.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/ios_acls/scenarios/ios-acls-merged/after_merged_acl_names.txt"

  ios-acls-deleted:
    platform: ios_acls
    sequence:
      # ── check_mode before (seq 0-1) ──
      - command: "show running-config | section access-list"
