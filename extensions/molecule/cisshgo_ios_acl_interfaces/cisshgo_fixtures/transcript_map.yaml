---
platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | include ^interface|ip access-group|ipv6 traffic-filter": "transcripts/cisco/ios/show_running-config_include_acl_gathered.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"
    context_search:
      "configure terminal": "(config)#"
      "interface": "(config-if)#"
      "enable": "#"
      "base": "#"
    context_hierarchy:
      "(config-if)#": "(config)#"
      "(config)#": "#"
      "#": ">"
    end_context: "#"

scenarios:
  ios-acl-interfaces-merged:
    platform: ios
    sequence:
      - command: "show running-config | include ^interface|ip access-group|ipv6 traffic-filter"
        transcript: "transcripts/scenarios/ios-acl-interfaces-merged/before.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "interface GigabitEthernet2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-group 110 in"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-group 123 out"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 traffic-filter temp_v6 in"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 traffic-filter test_v6 out"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "interface GigabitEthernet3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-group 110 in"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-group 123 out"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | include ^interface|ip access-group|ipv6 traffic-filter"
        transcript: "transcripts/scenarios/ios-acl-interfaces-merged/after.txt"
      - command: "show running-config | include ^interface|ip access-group|ipv6 traffic-filter"
        transcript: "transcripts/scenarios/ios-acl-interfaces-merged/after.txt"

