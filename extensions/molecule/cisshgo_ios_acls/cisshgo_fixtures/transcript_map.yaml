---
# CISSHGO transcript map — cisco.ios.ios_acls (Molecule)
#
# Each resource get_facts pulls:
#   1) show running-config | section access-list
#   2) show access-lists | include access list
#
# CISSHGO restarts the sequence from index 0 on every new TCP connection.
# Each Ansible play opens its own SSH/TCP session.
#
# Preview plays (check_mode only) consume entries 0-3 (before + after, 2 getters each).
# The main merged/deleted play also starts at 0; check_mode + apply + idempotent
# share one TCP session within that play.

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section access-list": "transcripts/cisco/ios/show_running-config_section_access-list_populated.txt"
      "show access-lists | include access list": "transcripts/cisco/ios/show_access-lists_include_populated.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  ios-acls-merged:
    platform: ios
    sequence:
      # ── check_mode before (seq 0-1) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-merged/before_empty.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-merged/before_empty_acl_names.txt"
      # ── check_mode after (seq 2-3, still empty) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-merged/before_empty.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-merged/before_empty_acl_names.txt"
      # ── apply before (seq 4-5) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-merged/before_empty.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-merged/before_empty_acl_names.txt"
      # ── apply: push config (seq 6-16) ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 access-list R1_TRAFFIC"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "deny tcp any eq www any eq telnet ack dscp af11 sequence 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-list standard std_acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "10 deny 192.0.2.0 0.0.0.255"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-list extended 110"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "10 deny icmp 192.0.2.0 0.0.0.255 192.0.3.0 0.0.0.255 echo dscp ef ttl eq 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip access-list extended 123"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "10 deny tcp 198.51.100.0 0.0.0.255 198.51.101.0 0.0.0.255 eq telnet ack tos 12"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "20 deny tcp 192.0.3.0 0.0.0.255 192.0.4.0 0.0.0.255 eq www ack dscp ef ttl lt 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # ── apply after (seq 17-18) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-merged/after_merged.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-merged/after_merged_acl_names.txt"
      # ── idempotent before (seq 19-20) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-merged/after_merged.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-merged/after_merged_acl_names.txt"

  ios-acls-deleted:
    platform: ios
    sequence:
      # ── check_mode before (seq 0-1) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-deleted/before_populated.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-deleted/before_populated_acl_names.txt"
      # ── check_mode after (seq 2-3, still populated) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-deleted/before_populated.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-deleted/before_populated_acl_names.txt"
      # ── apply before (seq 4-5) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-deleted/before_populated.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-deleted/before_populated_acl_names.txt"
      # ── apply: push config (seq 6-10) ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip access-list extended 110"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip access-list extended test_acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ipv6 access-list R1_TRAFFIC"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # ── apply after (seq 11-12) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-deleted/after_deleted.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-deleted/after_deleted_acl_names.txt"
      # ── idempotent before (seq 13-14) ──
      - command: "show running-config | section access-list"
        transcript: "transcripts/scenarios/ios-acls-deleted/after_deleted.txt"
      - command: "show access-lists | include access list"
        transcript: "transcripts/scenarios/ios-acls-deleted/after_deleted_acl_names.txt"
