                    dscp: af11
        state: merged
      register: result

    - name: "Assert merged first pass"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - result.before == {}
          - merged['commands'] | symmetric_difference(result['commands']) | length == 0
