- name: "ios_acls — state: merged (check_mode, apply, idempotency)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_acls/vars/main.yaml"
  tasks:
    - name: "Merged — check_mode"
      cisco.ios.ios_acls:
        config:
          - afi: ipv4
            acls:
              - name: std_acl
                acl_type: standard
                aces:
                  - grant: deny
                    sequence: 10
                    source:
