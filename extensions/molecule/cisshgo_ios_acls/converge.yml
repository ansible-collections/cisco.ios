        state: merged
      check_mode: true
      register: cm_merged

    - name: "Debug merged check_mode"
      ansible.builtin.debug:
        msg:
          changed: "{{ cm_merged.changed }}"
          commands: "{{ cm_merged.commands | default([]) }}"
          before: "{{ cm_merged.before | default({}) }}"
          after: "{{ cm_merged.after | default({}) }}"

    - name: "Merge ACL configuration"
      cisco.ios.ios_acls: &merged_acl
        config:
          - afi: ipv4
            acls:
              - name: std_acl
                acl_type: standard
                aces:
                  - grant: deny
                    sequence: 10
                    source:
