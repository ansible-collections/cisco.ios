---
# CISSHGO Transcript Map for cisco.ios.ios_bgp_address_family integration tests
#
# Platform: ios
# Getter: show running-config | section ^router bgp
#
# Emit order: per AF block, compare(self.parsers) → neighbors → networks →
# aggregate_addresses → redist_ospf → redist_ospfv3.
# Each AF block wrapped in "address-family <afi> <safi>" / "exit-address-family".
# For replaced: neighbor deletions at router bgp level before AF blocks.
# "router bgp <asn>" inserted at position 0 if commands generated.
#
# IMPORTANT: dict_merge(have, want) for merged state reorders the AF iteration.
# The actual AF order must be captured via check_mode, not assumed from config order.
#
# Scenarios:
#   ios-bgp-af-merged:   empty → merged + idempotency
#   ios-bgp-af-replaced: populated → replaced + idempotency
#   ios-bgp-af-deleted:  populated → deleted + idempotency

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^router bgp": "transcripts/cisco/ios/show_running-config_section_bgp_populated.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  # ── merged: empty → merged ──────────────────────────────────────────────
  # AF order from check_mode: multicast → ipv6 → unicast → mdt
  ios-bgp-af-merged:
    platform: ios
    sequence:
      # get_facts (have) — empty
      - command: "show running-config | section ^router bgp"
        transcript: "transcripts/scenarios/ios-bgp-af-merged/before_empty.txt"
      # edit_config: configure + commands + end
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "router bgp 65000"
        transcript: "transcripts/generic_empty_return.txt"
      # AF: ipv4 multicast
      - command: "address-family ipv4 multicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "default-metric 12"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "distance bgp 10 10 100"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "table-map test_tableMap filter"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "network 198.51.111.11 mask 255.255.255.255 route-map test"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "aggregate-address 192.0.3.1 255.255.255.255 as-confed-set"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"
      # AF: ipv6 unicast
      - command: "address-family ipv6 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "aggregate-address 2001:DB8:1234::/48 summary-only"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "aggregate-address 2001:DB8:5678::/48 as-confed-set"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "redistribute ospf 124 metric 10 match internal external 1 external 2 nssa-external 1 nssa-external 2 route-map bar include-connected"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"
      # AF: ipv4 unicast
      - command: "address-family ipv4 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "maximum-paths 12"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "maximum-secondary-paths eibgp 2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "redistribute connected metric 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "redistribute ospf 124"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "redistribute ospf 123 metric 10 match internal external 1 external 2 nssa-external 1 nssa-external 2 route-map bar"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "redistribute ospfv3 123 metric 10 match internal external 1 external 2 nssa-external 1 nssa-external 2 route-map bar"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"
      # AF: ipv4 mdt
      - command: "address-family ipv4 mdt"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "bgp dmzlink-bw"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "bgp soft-reconfig-backup"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "bgp dampening 1 10 100 5"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | section ^router bgp"
        transcript: "transcripts/scenarios/ios-bgp-af-merged/after_merged.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | section ^router bgp"
        transcript: "transcripts/scenarios/ios-bgp-af-merged/after_merged.txt"

  # ── replaced: populated → replaced ──────────────────────────────────────
  # AF order TBD via check_mode — using placeholder; will be corrected
  ios-bgp-af-replaced:
    platform: ios
    sequence:
      # get_facts (have) — populated
      - command: "show running-config | section ^router bgp"
        transcript: "transcripts/scenarios/ios-bgp-af-replaced/before_populated.txt"
      # edit_config
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "router bgp 65000"
        transcript: "transcripts/generic_empty_return.txt"
      # neighbor deletion at router bgp level (before AF blocks)
      - command: "no neighbor 10.1.1.1"
        transcript: "transcripts/generic_empty_return.txt"
      # AF: ipv4 unicast — redistribute changes
      - command: "address-family ipv4 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no redistribute connected"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no redistribute ospf 123"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "redistribute ospf 123 metric 15 match external 1 nssa-external 2 route-map foo"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no redistribute ospf 124"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no redistribute ospfv3 123"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "redistribute ospfv3 123 metric 15 match internal external 2 nssa-external 1 route-map foo"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"
      # AF: ipv4 multicast — various changes
      - command: "address-family ipv4 multicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no default-metric 12"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no distance bgp 10 10 100"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no table-map test_tableMap filter"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no bgp dampening 1 1 1 1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "neighbor 10.1.1.3 activate"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "network 192.0.2.1 mask 255.255.255.255 route-map test"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no network 198.51.111.11 mask 255.255.255.255 route-map test"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no aggregate-address 192.0.3.1 255.255.255.255 as-confed-set"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"
      # AF: ipv6 unicast — aggregate change + redistribute removal
      - command: "address-family ipv6 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "aggregate-address 2001:DB8:1234::/48 as-set"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no redistribute ospf 124"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | section ^router bgp"
        transcript: "transcripts/scenarios/ios-bgp-af-replaced/after_replaced.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | section ^router bgp"
        transcript: "transcripts/scenarios/ios-bgp-af-replaced/after_replaced.txt"

  # ── deleted: populated → deleted ─────────────────────────────────────────
  ios-bgp-af-deleted:
    platform: ios
    sequence:
      # get_facts (have) — populated
      - command: "show running-config | section ^router bgp"
        transcript: "transcripts/scenarios/ios-bgp-af-deleted/before_populated.txt"
      # edit_config: delete specific AFs
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "router bgp 65000"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no address-family ipv4 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no address-family ipv4 multicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no address-family ipv4 mdt"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no address-family ipv6 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | section ^router bgp"
        transcript: "transcripts/scenarios/ios-bgp-af-deleted/after_deleted.txt"
      # idempotent: get_facts (have) — no AFs left
      - command: "show running-config | section ^router bgp"
        transcript: "transcripts/scenarios/ios-bgp-af-deleted/after_deleted.txt"
