---
# CISSHGO device inventory for ios_bgp_global integration tests
#
# Ports (starting --starting-port, default 10000):
#   10000: platform (gathered, parsed, rendered)
#   10001: scenario ios-bgp-global-merged
#   10002: scenario ios-bgp-global-replaced
#   10003: scenario ios-bgp-global-deleted
#   10004: scenario ios-bgp-global-purged

devices:
  - platform: ios
    count: 1

  - scenario: ios-bgp-global-merged
    count: 1

  - scenario: ios-bgp-global-replaced
    count: 1

  - scenario: ios-bgp-global-deleted
    count: 1

  - scenario: ios-bgp-global-purged
    count: 1
