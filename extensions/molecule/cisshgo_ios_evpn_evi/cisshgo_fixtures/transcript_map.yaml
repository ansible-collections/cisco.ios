---
# CISSHGO transcript map for cisco.ios.ios_evpn_evi Molecule tests.
#
# Getter: show running-config | section ^l2vpn evpn instance .+$
#
# Like ios_evpn_global: each new TCP connection resets the CISSHGO scenario cursor.
#
# ResourceModule: merged sequence uses three getter entries before configure terminal,
# then two getter entries after end (post-apply + idempotent preamble).

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^l2vpn evpn instance .+$": "transcripts/cisco/ios/show_running-config_section_l2vpn_evpn_instance_populated.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  ios-evpn-evi-merged:
    platform: ios
    sequence:
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-merged/before_empty.txt"
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-merged/before_empty.txt"
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-merged/before_empty.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "l2vpn evpn instance 101 vlan-based"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "encapsulation vxlan"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "replication-type ingress"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-merged/after_merged.txt"
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-merged/after_merged.txt"

  ios-evpn-evi-deleted:
    platform: ios
    sequence:
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-deleted/before_populated.txt"
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-deleted/before_populated.txt"
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-deleted/before_populated.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no l2vpn evpn instance 101 vlan-based"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-deleted/after_deleted.txt"
      - command: "show running-config | section ^l2vpn evpn instance .+$"
        transcript: "transcripts/scenarios/ios-evpn-evi-deleted/after_deleted.txt"
