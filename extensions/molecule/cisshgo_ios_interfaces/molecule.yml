---
dependency:
  name: galaxy

driver:
  name: default
  options:
    managed: false

scenario:
  name: cisshgo_ios_interfaces
  test_sequence:
    - create
    - converge
    - verify
    - destroy

platforms:
  - name: cisshgo-ios-gathered
    groups:
      - ios_gathered
  - name: cisshgo-ios-merged
    groups:
      - ios_merged
  - name: cisshgo-ios-replaced
    groups:
      - ios_replaced
  - name: cisshgo-ios-overridden
    groups:
      - ios_overridden
  - name: cisshgo-ios-deleted
    groups:
      - ios_deleted
  - name: cisshgo-ios-rtt
    groups:
      - ios_rtt

provisioner:
  name: ansible
  inventory:
    links:
      hosts: ${MOLECULE_SCENARIO_DIRECTORY}/inventory/hosts.yml
  env:
    # Molecule runs ansible-playbook from an ephemeral directory, so point at the
    # ansible_collections parent (namespace dirs live one level below).
    ANSIBLE_COLLECTIONS_PATH: "${MOLECULE_SCENARIO_DIRECTORY}/../../../../.."
    ANSIBLE_HOST_KEY_CHECKING: "false"

verifier:
  name: ansible
