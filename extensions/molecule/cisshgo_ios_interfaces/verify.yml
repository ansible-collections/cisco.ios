---
# Molecule verify: Check CISSHGO logs for unknown commands

- name: "CISSHGO — Verify no unknown commands"
  hosts: localhost
  gather_facts: false
  vars:
    cisshgo_log_file: "{{ playbook_dir }}/.cisshgo.log"

  tasks:
    - name: "Check if cisshgo log file exists"
      ansible.builtin.stat:
        path: "{{ cisshgo_log_file }}"
      register: log_stat

    - name: "Read cisshgo log"
      when: log_stat.stat.exists
      ansible.builtin.slurp:
        src: "{{ cisshgo_log_file }}"
      register: cisshgo_log

    - name: "Count unknown command occurrences"
      when: log_stat.stat.exists
      ansible.builtin.set_fact:
        unknown_commands: >-
          {{ (cisshgo_log.content | b64decode).split('\n') | select('search', 'Unknown command') | list }}

    - name: "Display unknown commands (if any)"
      when:
        - log_stat.stat.exists
        - unknown_commands | length > 0
      ansible.builtin.debug:
        msg: |
          WARNING: CISSHGO received {{ unknown_commands | length }} unknown command(s).
          These commands need to be added to transcript_map.yaml:
          {% for cmd in unknown_commands %}
          - {{ cmd }}
          {% endfor %}

    - name: "Assert no unknown commands in cisshgo log"
      when: log_stat.stat.exists
      ansible.builtin.assert:
        that:
          - unknown_commands | length == 0
        fail_msg: >-
          CISSHGO logged {{ unknown_commands | length }} unknown command(s).
          Check {{ cisshgo_log_file }} for details and update transcript_map.yaml.
        success_msg: "All commands recognized by CISSHGO — transcript coverage is complete."

    - name: "Display cisshgo log summary"
      when: log_stat.stat.exists
      ansible.builtin.debug:
        msg: >-
          CISSHGO verification passed.
          Log file: {{ cisshgo_log_file }}
          Log size: {{ log_stat.stat.size }} bytes
