---
# CISSHGO device inventory for ios_l2_interfaces Molecule scenario
#
# Ports (starting --starting-port, default 10000):
#   10000: platform (gathered, parsed, rendered)
#   10001: scenario ios-l2-interfaces-merged (+ merged_again)
#   10002: scenario ios-l2-interfaces-replaced
#   10003: scenario ios-l2-interfaces-overridden
#   10004: scenario ios-l2-interfaces-deleted
#   10005: scenario ios-l2-interfaces-rtt
devices:
  - platform: ios
    count: 1

  - scenario: ios-l2-interfaces-merged
    count: 1

  - scenario: ios-l2-interfaces-replaced
    count: 1

  - scenario: ios-l2-interfaces-overridden
    count: 1

  - scenario: ios-l2-interfaces-deleted
    count: 1

  - scenario: ios-l2-interfaces-rtt
    count: 1
