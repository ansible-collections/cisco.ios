---
# CISSHGO device inventory for ios_l2_interfaces Molecule tests
#
# Port layout (starting from CISSHGO -p / CISSHGO_PORT, default 10000):
#   10000 — platform ios (gathered)
#   10001 — scenario ios-l2-interfaces-merged (merged + idempotency)

devices:
  - platform: ios
    count: 1

  - scenario: ios-l2-interfaces-merged
    count: 1
