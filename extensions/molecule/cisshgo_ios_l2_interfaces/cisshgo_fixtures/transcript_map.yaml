---
# CISSHGO Transcript Map for cisco.ios.ios_l2_interfaces Molecule tests
#
# Platform: ios — gathered play (port 10000) and fallback commands.
# Scenario: ios-l2-interfaces-merged — merged + idempotency (port 10001).

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios-l2"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"

      "show version": "transcripts/cisco/ios/show_version.txt"
      # Some fact-gather paths issue additional read-only commands; serve empty if present.
      "show vlan": "transcripts/generic_empty_return.txt"

      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^interface": "transcripts/cisco/ios/show_running-config_section_l2_gathered.txt"

      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "interface": "(config-if)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config-if)#": "(config)#"
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  ios-l2-interfaces-merged:
    platform: ios
    sequence:
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-l2-interfaces-merged/before.txt"

      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "interface GigabitEthernet2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "switchport access vlan 30"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "switchport voice vlan 40"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "switchport private-vlan association host 2000 2500"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "interface GigabitEthernet3"
        transcript: "transcripts/generic_empty_return.txt"
      # Command order must match the module (see state: rendered for same config).
      # Mode trunk is generated before native / allowed / pruning on the trunk interface.
      - command: "switchport trunk encapsulation dot1q"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "switchport mode trunk"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "switchport trunk native vlan 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "switchport trunk allowed vlan 15-20,40"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "switchport trunk pruning vlan 10,20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-l2-interfaces-merged/after.txt"

      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-l2-interfaces-merged/after.txt"
