---
# Molecule converge: ios_l2_interfaces against CISSHGO (gathered + merged + idempotency)

- name: "Gather ios_l2_interfaces facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_l2_interfaces/vars/main.yaml"
  tasks:
    - name: "Gather L2 interface facts from fixture"
      cisco.ios.ios_l2_interfaces:
        state: gathered
      register: result

    - name: "Assert gathered facts match expected config"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - gathered['config'] | symmetric_difference(result['gathered']) | length == 0
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed"

- name: "Merge ios_l2_interfaces configuration (merged state + idempotency)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_l2_interfaces/vars/main.yaml"
  tasks:
    - name: "Merge L2 interface configuration"
      cisco.ios.ios_l2_interfaces:
        config:
          - name: GigabitEthernet2
            access:
              vlan: 30
            voice:
              vlan: 40
            private_vlan:
              association: true
              host: true
              primary_range: 2000
              secondary_range: 2500
          - name: GigabitEthernet3
            trunk:
              allowed_vlans: 15-20,40
              native_vlan: 20
              pruning_vlans: 10,20
              encapsulation: dot1q
            mode: trunk
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - merged['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert before state matches expected"
      ansible.builtin.assert:
        that:
          - merged['before'] | symmetric_difference(result['before']) | length == 0
        quiet: true

    - name: "Assert after state matches expected"
      ansible.builtin.assert:
        that:
          - merged['after'] | symmetric_difference(result['after']) | length == 0
        quiet: true

    - name: "Merge L2 interface configuration — idempotent run"
      cisco.ios.ios_l2_interfaces:
        config:
          - name: GigabitEthernet2
            access:
              vlan: 30
            voice:
              vlan: 40
            private_vlan:
              association: true
              host: true
              primary_range: 2000
              secondary_range: 2500
          - name: GigabitEthernet3
            trunk:
              allowed_vlans: 15-20,40
              native_vlan: 20
              pruning_vlans: 10,20
              encapsulation: dot1q
            mode: trunk
        state: merged
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed (with idempotency)"
