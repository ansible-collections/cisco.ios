---
# Ansible inventory for Molecule scenario cisshgo_ios_l2_interfaces.
#
# Network connection vars MUST NOT live under `all.vars` — Molecule also targets
# `localhost` for create/verify/destroy; inheriting network_cli there breaks
# gather_facts. Vars are scoped to `cisshgo_targets` only.
#
# Default CISSHGO starting port is 10000; this scenario uses two listeners
# (platform + one scenario). Ports: base, base+1. Match create.yml cisshgo_port_count
# and CISSHGO_PORT when overriding.

all:
  children:
    cisshgo_targets:
      vars:
        ansible_host: 127.0.0.1
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_user: admin
        ansible_password: admin
        ansible_become: false
        ansible_network_cli_ssh_type: libssh
        ansible_libssh_key_exchange_algorithms: +diffie-hellman-group14-sha1,+diffie-hellman-group-exchange-sha1
        ansible_libssh_hostkeys: +ssh-rsa
        ansible_libssh_publickey_algorithms: +ssh-rsa
        ansible_command_timeout: 200
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      children:
        ios_gathered:
          hosts:
            cisshgo-ios-l2-gathered:
              ansible_port: 10000
        ios_merged:
          hosts:
            cisshgo-ios-l2-merged:
              ansible_port: 10001
