---
dependency:
  name: galaxy

driver:
  name: default
  options:
    managed: false

scenario:
  name: cisshgo_ios_l2_interfaces
  test_sequence:
    - create
    - converge
    - verify
    - destroy

platforms:
  - name: cisshgo-ios-l2-gathered
    groups:
      - ios_gathered
  - name: cisshgo-ios-l2-merged
    groups:
      - ios_merged

provisioner:
  name: ansible
  inventory:
    links:
      hosts: ${MOLECULE_SCENARIO_DIRECTORY}/inventory/hosts.yml
  env:
    ANSIBLE_COLLECTIONS_PATH: "${MOLECULE_SCENARIO_DIRECTORY}/../../../../.."
    ANSIBLE_HOST_KEY_CHECKING: "false"

verifier:
  name: ansible
