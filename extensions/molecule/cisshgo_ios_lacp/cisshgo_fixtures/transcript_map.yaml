---
# CISSHGO transcript map for cisco.ios.ios_lacp Molecule tests.
#
# Getter: show lacp sys-id
#
# Like ios_vrf_global: one Ansible play with check_mode + apply + idempotency keeps a
# single SSH session, so the scenario begins with three duplicate getter transcripts
# before configure terminal (check_mode ×2 + first get_facts of the real merge).
#
# ios_lacp always calls get_lacp_facts twice per action-state invocation; the third
# "show lacp sys-id" after "end" covers the trailing get from merge + both reads on the
# idempotent task.

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show lacp sys-id": "transcripts/cisco/ios/show_lacp_sysid_populated.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  ios-lacp-merged:
    platform: ios
    sequence:
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-merged/before_default.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-merged/before_default.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-merged/before_default.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "lacp system-priority 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-merged/after_merged.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-merged/after_merged.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-merged/after_merged.txt"

  ios-lacp-deleted:
    platform: ios
    sequence:
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-deleted/before_populated.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-deleted/before_populated.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-deleted/before_populated.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no lacp system-priority"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-deleted/after_deleted.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-deleted/after_deleted.txt"
      - command: "show lacp sys-id"
        transcript: "transcripts/scenarios/ios-lacp-deleted/after_deleted.txt"
