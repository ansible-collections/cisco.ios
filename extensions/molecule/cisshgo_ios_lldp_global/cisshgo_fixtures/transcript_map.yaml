---
# CISSHGO Transcript Map for cisco.ios.ios_lldp_global integration tests
#
# Platform: ios
# Stateless layer for connection setup and read-only show commands (gathered,
# parsed, rendered on the platform port).
#
# Getter: show running-config | section ^lldp
#
# Scenarios:
# ios-lldp-global-merged: merged state + idempotency
# ios-lldp-global-replaced: replaced state + idempotency
# ios-lldp-global-deleted: deleted state + idempotency

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"

      "show version": "transcripts/cisco/ios/show_version.txt"

      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^lldp": "transcripts/cisco/ios/show_running-config_section_lldp_gathered.txt"

      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  ios-lldp-global-merged:
    platform: ios
    sequence:
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-merged/before.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "lldp holdtime 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "lldp run"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "lldp timer 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "lldp reinit 3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-merged/after.txt"
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-merged/after.txt"
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-merged/after.txt"

  ios-lldp-global-replaced:
    platform: ios
    sequence:
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-replaced/before.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no lldp run"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no lldp timer"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "lldp holdtime 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "lldp reinit 5"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-replaced/after.txt"
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-replaced/after.txt"
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-replaced/after.txt"

  ios-lldp-global-deleted:
    platform: ios
    sequence:
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-deleted/before.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no lldp holdtime"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no lldp run"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no lldp timer"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no lldp reinit"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-deleted/after.txt"
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-deleted/after.txt"
      - command: "show running-config | section ^lldp"
        transcript: "transcripts/scenarios/ios-lldp-global-deleted/after.txt"
