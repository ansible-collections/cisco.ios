---
# CISSHGO transcript map for cisco.ios.ios_lldp_interfaces (molecule / check_mode)
#
# Getter: show lldp interface
#
# Platform defaults serve the gathered host (no scenario). Scenario hosts override
# sequence entries for stateful tests when expanded beyond check_mode.

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show lldp interface": "transcripts/cisco/ios/show_lldp_interface_populated.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  # Merged path: have = all interfaces Rx/Tx disabled (see before_disabled)
  ios-lldp-intf-merged:
    platform: ios
    sequence:
      # get_facts (before and after); check_mode skips edit so both reads use the same fixture
      - command: "show lldp interface"
        transcript: "transcripts/scenarios/ios-lldp-intf-merged/before_disabled.txt"
      - command: "show lldp interface"
        transcript: "transcripts/scenarios/ios-lldp-intf-merged/before_disabled.txt"

  # Deleted path: have = GigE1–3 enabled, GigE4 disabled
  ios-lldp-intf-deleted:
    platform: ios
    sequence:
      - command: "show lldp interface"
        transcript: "transcripts/scenarios/ios-lldp-intf-deleted/before_populated.txt"
      - command: "show lldp interface"
        transcript: "transcripts/scenarios/ios-lldp-intf-deleted/before_populated.txt"
