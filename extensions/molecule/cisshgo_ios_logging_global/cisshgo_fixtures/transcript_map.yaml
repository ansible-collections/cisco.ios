      - command: "no logging host 192.0.2.13"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after first run)
      - command: "show running-config | include logging"
        transcript: "transcripts/scenarios/ios-logging-global-replaced/after_replaced.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | include logging"
        transcript: "transcripts/scenarios/ios-logging-global-replaced/after_replaced.txt"
      # idempotent: get_facts (after)
      - command: "show running-config | include logging"
        transcript: "transcripts/scenarios/ios-logging-global-replaced/after_replaced.txt"

