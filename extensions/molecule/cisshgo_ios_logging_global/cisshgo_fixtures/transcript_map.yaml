---
platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | include logging": "transcripts/cisco/ios/show_running-config_include_logging_populated.txt"
      "show logging | include Trap": "transcripts/cisco/ios/show_logging_include_trap.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  ios-logging-global-merged:
    platform: ios
    sequence:
      # get_facts (have) — empty device
      - command: "show running-config | include logging"
        transcript: "transcripts/scenarios/ios-logging-global-merged/before_empty.txt"
      # trap fallback (empty → no "logging trap")
      - command: "show logging | include Trap"
        transcript: "transcripts/cisco/ios/show_logging_include_trap.txt"
      # edit_config: configure + 16 commands + end
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging message-counter log"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging message-counter syslog"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging buffered xml 5099 notifications"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging cns-events warnings"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging console xml critical"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging dmvpn rate-limit 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging exception 4099"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging facility local5"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging monitor warnings"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging on"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging trap informational"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging userinfo"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging host 192.0.2.12"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging host 192.0.2.11 xml"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging host 192.0.2.10 filtered stream 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "logging host 192.0.2.13 transport tcp port 514"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | include logging"
        transcript: "transcripts/scenarios/ios-logging-global-merged/after_populated.txt"

  ios-logging-global-replaced:
    platform: ios
