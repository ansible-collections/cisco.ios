---
# CISSHGO Transcript Map for cisco.ios.ios_ntp_global integration tests
#
# Platform: ios — connection setup and read-only shows (gathered, parsed, rendered).
# Scenarios: merged, overridden, deleted, rtt (no standalone replaced scenario).
#
# Facts / resource getter: show running-config | section ^ntp

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"

      "show version": "transcripts/cisco/ios/show_version.txt"

      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^ntp": "transcripts/cisco/ios/show_running-config_section_ntp_gathered.txt"

      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  # ========================================================================
  # ios_ntp_global: state=merged
  # ========================================================================
  ios-ntp-global-merged:
    platform: ios
    sequence:
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-merged/before.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp master 4"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp max-associations 34"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp maxdistance 3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp mindistance 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-merged/after.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-merged/after.txt"

  # ========================================================================
  # ios_ntp_global: state=overridden
  # ========================================================================
  ios-ntp-global-overridden:
    platform: ios
    sequence:
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-overridden/before.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp broadcastdelay 113"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp logging"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp master 4"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp max-associations 34"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp maxdistance 3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp mindistance 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp orphan 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp panic update"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp peer 192.0.2.10 version 2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp server 192.0.2.15 key 2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-overridden/after.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-overridden/after.txt"

  # ========================================================================
  # ios_ntp_global: state=deleted
  # ========================================================================
  ios-ntp-global-deleted:
    platform: ios
    sequence:
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-deleted/before.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp broadcastdelay 22"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp logging"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp master 4"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp max-associations 34"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp maxdistance 3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp mindistance 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp orphan 4"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp panic update"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp peer 192.0.2.10 version 2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-deleted/after.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-deleted/after.txt"

  # ========================================================================
  # ios_ntp_global: RTT (merged -> ios_facts -> replaced drift -> overridden revert)
  # ========================================================================
  ios-ntp-global-rtt:
    platform: ios
    sequence:
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-merged/before.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp mindistance 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp orphan 4"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp panic update"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-rtt/after_base.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-rtt/after_base.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-rtt/after_base.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ntp maxdistance 3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-rtt/after_drift.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-rtt/after_drift.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ntp maxdistance 3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^ntp"
        transcript: "transcripts/scenarios/ios-ntp-global-rtt/after_base.txt"
