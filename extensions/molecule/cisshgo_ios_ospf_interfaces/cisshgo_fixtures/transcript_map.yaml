---
# CISSHGO Transcript Map for cisco.ios.ios_ospf_interfaces integration tests
#
# Platform: ios
# Getter: show running-config | section ^interface
#
# Emit order derived from source: _compare_afis iterates IPv4 then IPv6,
# using parsers in order: name, process, adjacency, authentication, bfd,
# cost, database_filter, dead_interval, demand_circuit, flood_reduction,
# hello_interval, lls, manet, mtu_ignore, multi_area, neighbor, network,
# prefix_suppression, priority, resync_timeout, retransmit_interval,
# shutdown, transmit_delay, ttl_security.
# _compare prepends "interface <name>" when commands are generated.
#
# Scenarios:
#   ios-ospf-intf-merged:     empty → populated + idempotency
#   ios-ospf-intf-replaced:   populated → replaced + idempotency
#   ios-ospf-intf-overridden: populated → overridden + idempotency
#   ios-ospf-intf-deleted:    populated → empty + idempotency

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^interface": "transcripts/cisco/ios/show_running-config_section_interface_populated.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  # ── merged: empty → populated (GE2 with OSPF) ─────────────────────────
  ios-ospf-intf-merged:
    platform: ios
    sequence:
      # ── get_facts (have) — empty device ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-merged/before_empty.txt"

      # ── configure: empty → populated ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"

      # GE2: interface stanza (inserted by _compare)
      - command: "interface GigabitEthernet2"
        transcript: "transcripts/generic_empty_return.txt"
      # GE2 IPv4 parsers in order
      - command: "ip ospf 10 area 30"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf adjacency stagger disable"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf bfd"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf cost 5"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf dead-interval 5"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf demand-circuit ignore"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf network broadcast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf priority 25"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf resync-timeout 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf shutdown"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf ttl-security hops 50"
        transcript: "transcripts/generic_empty_return.txt"
      # GE2 IPv6 parsers in order
      - command: "ipv6 ospf adjacency stagger disable"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 ospf database-filter all out"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 ospf priority 55"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 ospf transmit-delay 45"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"

      # ── get_facts (after) — populated ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-merged/after_populated.txt"

      # ── idempotent run ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-merged/after_populated.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-merged/after_populated.txt"

  # ── replaced: populated → add GE3 ipv6 ────────────────────────────────
  ios-ospf-intf-replaced:
    platform: ios
    sequence:
      # ── get_facts (have) — populated ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-replaced/before_populated.txt"

      # ── configure: add GE3 ipv6 ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "interface GigabitEthernet3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 ospf adjacency stagger disable"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 ospf priority 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 ospf transmit-delay 30"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"

      # ── get_facts (after) — replaced ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-replaced/after_replaced.txt"

      # ── idempotent run ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-replaced/after_replaced.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-replaced/after_replaced.txt"

  # ── overridden: populated → GE2 ipv6-only + GE3 ipv4 ──────────────────
  ios-ospf-intf-overridden:
    platform: ios
    sequence:
      # ── get_facts (have) — populated ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-overridden/before_populated.txt"

      # ── configure: override ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"

      # GE2: strip ipv4, change ipv6
      - command: "interface GigabitEthernet2"
        transcript: "transcripts/generic_empty_return.txt"
      # GE2 IPv4 negations (parser order)
      - command: "no ip ospf 10 area 30"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf adjacency stagger disable"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf bfd"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf cost 5"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf dead-interval 5"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf demand-circuit ignore"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf network broadcast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf priority 25"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf resync-timeout 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf shutdown"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf ttl-security hops 50"
        transcript: "transcripts/generic_empty_return.txt"
      # GE2 IPv6 changes
      - command: "no ipv6 ospf database-filter all out"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 ospf priority 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 ospf transmit-delay 30"
        transcript: "transcripts/generic_empty_return.txt"

      # GE3: add ipv4
      - command: "interface GigabitEthernet3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf 10 area 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf adjacency stagger disable"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf cost 30"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf priority 40"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip ospf ttl-security hops 50"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"

      # ── get_facts (after) — overridden ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-overridden/after_overridden.txt"

      # ── idempotent run ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-overridden/after_overridden.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-overridden/after_overridden.txt"

  # ── deleted: populated → empty (GE2 OSPF removed) ─────────────────────
  ios-ospf-intf-deleted:
    platform: ios
    sequence:
      # ── get_facts (have) — populated ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-deleted/before_populated.txt"

      # ── configure: delete all OSPF from GE2 ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "interface GigabitEthernet2"
        transcript: "transcripts/generic_empty_return.txt"
      # GE2 IPv4 negations (parser order)
      - command: "no ip ospf 10 area 30"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf adjacency stagger disable"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf bfd"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf cost 5"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf dead-interval 5"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf demand-circuit ignore"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf network broadcast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf priority 25"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf resync-timeout 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf shutdown"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip ospf ttl-security hops 50"
        transcript: "transcripts/generic_empty_return.txt"
      # GE2 IPv6 negations (parser order)
      - command: "no ipv6 ospf adjacency stagger disable"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ipv6 ospf database-filter all out"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ipv6 ospf priority 55"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ipv6 ospf transmit-delay 45"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"

      # ── get_facts (after) — empty ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-deleted/after_empty.txt"

      # ── idempotent run ──
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-deleted/after_empty.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-ospf-intf-deleted/after_empty.txt"
