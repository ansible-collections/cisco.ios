---
# CISSHGO Transcript Map for cisco.ios.ios_ospfv3 integration tests
#
# Platform: ios
# Getter: show running-config | section ^router ospfv3
#
# Emit order derived from source: _compare calls addcmd(pid), then
# compare(self.parsers), then _areas_compare, then _address_family_compare.
# AF comparison generates address-family/exit-address-family block with
# af_parsers and AF-level areas inside.
#
# Scenarios:
#   ios-ospfv3-merged:     empty → populated + idempotency
#   ios-ospfv3-replaced:   populated → replaced + idempotency
#   ios-ospfv3-overridden: populated → overridden + idempotency
#   ios-ospfv3-deleted:    populated → empty + idempotency

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^router ospfv3": "transcripts/cisco/ios/show_running-config_section_router_ospfv3_populated.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  # ── merged: empty → populated ──────────────────────────────────────────
  ios-ospfv3-merged:
    platform: ios
    sequence:
      # ── get_facts (have) — empty device ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-merged/before_empty.txt"

      # ── configure: empty → populated ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"

      # Process 1: pid
      - command: "router ospfv3 1"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 1: self.parsers — max_metric
      - command: "max-metric router-lsa on-startup 110"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 1: _areas_compare — area 10
      - command: "area 10 nssa default-information-originate metric 10"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 1: _address_family_compare — AF ipv4 vrf ospf_vrf
      - command: "address-family ipv4 unicast vrf ospf_vrf"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "adjacency stagger 25 25"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "area 25 nssa default-information-originate metric 25 nssa-only"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"

      # Process 200: pid
      - command: "router ospfv3 200"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 200: self.parsers — auto_cost, max_metric
      - command: "auto-cost reference-bandwidth 4"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "max-metric router-lsa on-startup 100"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 200: _address_family_compare — AF ipv4
      - command: "address-family ipv4 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "adjacency stagger 200 200"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"

      # ── get_facts (after) — populated ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-merged/after_populated.txt"

      # ── idempotent run: get_facts (have) — populated ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-merged/after_populated.txt"
      # no changes
      # ── idempotent run: get_facts (after) — populated ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-merged/after_populated.txt"

  # ── replaced: populated → replaced ────────────────────────────────────
  ios-ospfv3-replaced:
    platform: ios
    sequence:
      # ── get_facts (have) — populated ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-replaced/before_populated.txt"

      # ── configure: replace process 200 ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"

      # Process 200: pid
      - command: "router ospfv3 200"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 200: self.parsers — remove auto_cost, change max_metric
      - command: "no auto-cost reference-bandwidth 4"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "max-metric router-lsa on-startup 200"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 200: _areas_compare — add area 10
      - command: "area 10 nssa default-information-originate metric 10"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 200: _address_family_compare — AF ipv4 (same afi, change adjacency, add area 200)
      - command: "address-family ipv4 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "adjacency stagger 50 50"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "area 200 nssa default-information-originate metric 200 nssa-only"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"

      # ── get_facts (after) — replaced ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-replaced/after_replaced.txt"

      # ── idempotent run: get_facts (have) — replaced ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-replaced/after_replaced.txt"
      # no changes
      # ── idempotent run: get_facts (after) — replaced ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-replaced/after_replaced.txt"

  # ── overridden: populated → overridden ─────────────────────────────────
  ios-ospfv3-overridden:
    platform: ios
    sequence:
      # ── get_facts (have) — populated ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-overridden/before_populated.txt"

      # ── configure: override (delete process 1, change process 200) ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"

      # Delete extra process 1
      - command: "no router ospfv3 1"
        transcript: "transcripts/generic_empty_return.txt"

      # Process 200: pid
      - command: "router ospfv3 200"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 200: self.parsers
      - command: "no auto-cost reference-bandwidth 4"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "max-metric router-lsa on-startup 200"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 200: _areas_compare — add area 10
      - command: "area 10 nssa default-information-originate metric 10"
        transcript: "transcripts/generic_empty_return.txt"
      # Process 200: _address_family_compare — AF ipv4
      - command: "address-family ipv4 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "adjacency stagger 50 50"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "area 200 nssa default-information-originate metric 200 nssa-only"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "exit-address-family"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"

      # ── get_facts (after) — overridden ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-overridden/after_overridden.txt"

      # ── idempotent run: get_facts (have) — overridden ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-overridden/after_overridden.txt"
      # no changes
      # ── idempotent run: get_facts (after) — overridden ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-overridden/after_overridden.txt"

  # ── deleted: populated → empty ─────────────────────────────────────────
  ios-ospfv3-deleted:
    platform: ios
    sequence:
      # ── get_facts (have) — populated ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-deleted/before_populated.txt"

      # ── configure: delete both processes ──
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "no router ospfv3 1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no router ospfv3 200"
        transcript: "transcripts/generic_empty_return.txt"

      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"

      # ── get_facts (after) — empty ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-deleted/after_empty.txt"

      # ── idempotent run: get_facts (have) — empty ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-deleted/after_empty.txt"
      # no changes
      # ── idempotent run: get_facts (after) — empty ──
      - command: "show running-config | section ^router ospfv3"
        transcript: "transcripts/scenarios/ios-ospfv3-deleted/after_empty.txt"
