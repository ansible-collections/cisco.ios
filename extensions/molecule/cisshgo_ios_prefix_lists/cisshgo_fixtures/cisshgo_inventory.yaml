---
# CISSHGO device inventory for ios_prefix_lists integration tests
#
# Ports (starting --starting-port, default 10000):
#   10000: platform (gathered, parsed, rendered)
#   10001: scenario ios-prefix-lists-merged
#   10002: scenario ios-prefix-lists-replaced
#   10003: scenario ios-prefix-lists-overridden
#   10004: scenario ios-prefix-lists-deleted

devices:
  - platform: ios
    count: 1

  - scenario: ios-prefix-lists-merged
    count: 1

  - scenario: ios-prefix-lists-replaced
    count: 1

  - scenario: ios-prefix-lists-overridden
    count: 1

  - scenario: ios-prefix-lists-deleted
    count: 1
