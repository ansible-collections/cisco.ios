---
# CISSHGO Transcript Map for cisco.ios.ios_route_maps integration tests
#
# Platform: ios
# Getter: show running-config | section ^route-map
#
# Emit order verified via check_mode:
#   merged:   test_2 → test_1 entry 10 → test_1 entry 20
#   replaced: test_1 entry 10 changes → no test_1 entry 20 → test_replaced entry 10
#   deleted:  no route-map test_1
#
# Scenarios:
#   ios-route-maps-merged:   empty → merged + idempotency
#   ios-route-maps-replaced: populated → replaced + idempotency
#   ios-route-maps-deleted:  populated → deleted + idempotency

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^route-map": "transcripts/cisco/ios/show_running-config_section_route-map_populated.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  # ── merged: empty → merged ──────────────────────────────────────────────
  ios-route-maps-merged:
    platform: ios
    sequence:
      # get_facts (have) — empty
      - command: "show running-config | section ^route-map"
        transcript: "transcripts/scenarios/ios-route-maps-merged/before_empty.txt"
      # edit_config: configure + commands + end
      # CML emit order (PYTHONHASHSEED=0): test_1 entries first, then test_2
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      # route-map test_1 deny 10
      - command: "route-map test_1 deny 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "description this is test route"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match community test_comm"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ip next-hop prefix-list test_1_new test_2_new"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ip route-source 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match security-group source tag 10 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match local-preference 100 50"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match mpls-label"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set as-path prepend 64512"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set community 4259840100 4259840200"
        transcript: "transcripts/generic_empty_return.txt"
      # route-map test_1 deny 20
      - command: "route-map test_1 deny 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "continue 100"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match additional-paths advertise-set all group-best"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match as-path 100 200"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ipv6 address test_acl_20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match route-type level-1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match tag list test_match_tag"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match track 105"
        transcript: "transcripts/generic_empty_return.txt"
      # route-map test_2 deny 10
      - command: "route-map test_2 deny 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ipv6 address test_ip_acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ipv6 next-hop prefix-list test_new"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ipv6 route-source route_src_acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match security-group source tag 10 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match local-preference 105 55"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match mpls-label"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set aigp-metric 100"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set as-path prepend 65111 65111"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set automatic-tag"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set extcommunity cost pre-bestpath 10 100"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip address prefix-list 192.0.2.1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip df 1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip next-hop recursive global 198.51.110.1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip next-hop verify-availability 198.51.111.1 100 track 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip precedence critical"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | section ^route-map"
        transcript: "transcripts/scenarios/ios-route-maps-merged/after_merged.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | section ^route-map"
        transcript: "transcripts/scenarios/ios-route-maps-merged/after_merged.txt"

  # ── replaced: populated → replaced ──────────────────────────────────────
  ios-route-maps-replaced:
    platform: ios
    sequence:
      # get_facts (have) — populated
      - command: "show running-config | section ^route-map"
        transcript: "transcripts/scenarios/ios-route-maps-replaced/before_populated.txt"
      # edit_config
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      # route-map test_1 deny 10 — modifications
      - command: "route-map test_1 deny 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no description"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "description this is replaced route"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no match community test_comm"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match community test_comm_replaced"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no match ip next-hop prefix-list test_1_new test_2_new"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ip next-hop 10 test1_acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ip flowspec dest-pfx test_acl_1 test_acl_2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no match ip route-source 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match length 10 100"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match metric external 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no match local-preference 100 50"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set extcommunity vpn-distinguisher 192.0.2.1:12 additive"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set as-path prepend 64512 64512"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no set community 4259840100 4259840200"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set community 4259840300"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set metric 100 +100 10 20 30"
        transcript: "transcripts/generic_empty_return.txt"
      # remove test_1 entry 20
      - command: "no route-map test_1 deny 20"
        transcript: "transcripts/generic_empty_return.txt"
      # route-map test_replaced deny 10 — new
      - command: "route-map test_replaced deny 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ipv6 address test_acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ipv6 next-hop prefix-list test_new"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match ipv6 route-source route_src_acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match security-group source tag 15 20"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match local-preference 105 110"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "match mpls-label"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set aigp-metric 100"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set as-path prepend 65111 65111"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set automatic-tag"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set extcommunity cost pre-bestpath 10 100"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip address prefix-list 192.0.2.1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip df 1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip next-hop recursive global 198.110.51.1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip next-hop verify-availability 198.110.51.2 100 track 10"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "set ip precedence critical"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | section ^route-map"
        transcript: "transcripts/scenarios/ios-route-maps-replaced/after_replaced.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | section ^route-map"
        transcript: "transcripts/scenarios/ios-route-maps-replaced/after_replaced.txt"

  # ── deleted: populated → deleted ─────────────────────────────────────────
  ios-route-maps-deleted:
    platform: ios
    sequence:
      # get_facts (have) — populated
      - command: "show running-config | section ^route-map"
        transcript: "transcripts/scenarios/ios-route-maps-deleted/before_populated.txt"
      # edit_config: delete test_1
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no route-map test_1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | section ^route-map"
        transcript: "transcripts/scenarios/ios-route-maps-deleted/after_deleted.txt"
      # idempotent: get_facts (have) — only test_2 remains
      - command: "show running-config | section ^route-map"
        transcript: "transcripts/scenarios/ios-route-maps-deleted/after_deleted.txt"
