---
# CISSHGO Transcript Map for cisco.ios.ios_snmp_server integration tests
#
# Platform: ios
# Getter: show running-config | section ^snmp  +  show snmp user
#
# Scenarios:
#   ios-snmp-server-merged:     populated → merged + idempotency
#   ios-snmp-server-overridden: populated → overridden + idempotency
#   ios-snmp-server-deleted:    populated → empty + idempotency

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^snmp": "transcripts/cisco/ios/show_running-config_section_snmp_populated.txt"
      "show snmp user": "transcripts/cisco/ios/show_snmp_user_empty.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  # ── merged: populated → merged ───────────────────────────────────────
  ios-snmp-server-merged:
    platform: ios
    sequence:
      # get_facts (have) — populated device
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-merged/before_populated.txt"
      # edit_config: configure + 5 commands + end
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      # simple parsers: contact, location, packet_size
      - command: "snmp-server contact john@doe.org"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "snmp-server location in the racks"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "snmp-server packetsize 900"
        transcript: "transcripts/generic_empty_return.txt"
      # list parsers: hosts, communities
      - command: "snmp-server host 192.0.2.10 informs version 2c integrationComm isis"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "snmp-server community community_name ro ADMIN-SUP"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-merged/after_merged.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-merged/after_merged.txt"
      # idempotent: get_facts (after)
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-merged/after_merged.txt"

  # ── overridden: populated → overridden ───────────────────────────────
  ios-snmp-server-overridden:
    platform: ios
    sequence:
      # get_facts (have) — populated
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-overridden/before_populated.txt"
      # edit_config: configure + 7 commands + end
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      # simple parsers negated: contact, inform, ip, system_shutdown
      - command: "no snmp-server contact contact updated using play"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server inform pending 2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server ip dscp 2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server system-shutdown"
        transcript: "transcripts/generic_empty_return.txt"
      # list parsers: engine_id negated, community added + community negated
      - command: "no snmp-server engineID remote 192.0.2.12 udp-port 25 AB0C5342FF0F"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "snmp-server community communityOvverriden rw acl_uq"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server community integrationComm rw test_Acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-overridden/after_overridden.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-overridden/after_overridden.txt"
      # idempotent: get_facts (after)
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-overridden/after_overridden.txt"

  # ── deleted: populated → empty ───────────────────────────────────────
  ios-snmp-server-deleted:
    platform: ios
    sequence:
      # get_facts (have) — populated
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-deleted/before_populated.txt"
      # edit_config: configure + 8 negate commands + end
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      # simple parsers negated
      - command: "no snmp-server contact contact updated using play"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server inform pending 2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server ip dscp 2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server location location entry for snmp"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server packetsize 500"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server system-shutdown"
        transcript: "transcripts/generic_empty_return.txt"
      # list parsers negated
      - command: "no snmp-server engineID remote 192.0.2.12 udp-port 25 AB0C5342FF0F"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no snmp-server community integrationComm rw test_Acl"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after) — empty
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-deleted/after_empty.txt"
      # idempotent: get_facts (have) — empty
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-deleted/after_empty.txt"
      # idempotent: get_facts (after) — empty
      - command: "show running-config | section ^snmp"
        transcript: "transcripts/scenarios/ios-snmp-server-deleted/after_empty.txt"
