---
# CISSHGO Transcript Map for cisco.ios.ios_static_routes integration tests
#
# Platform: ios
# Getter: show running-config | include ^ip route .+ |^ipv6 route .+
#
# Emit order derived from source code analysis:
#   generate_commands iterates wantd keys (config order for replaced/overridden/deleted,
#   haved order for merged via dict_merge). Within each VRF/global block,
#   _compare_top_level_keys iterates AFIs (ipv4 then ipv6).
#   Within each AFI, _compare iterates want keys then remaining have keys (negations).
#
# Scenarios:
#   ios-static-routes-merged:     populated → merged names + new route + idempotency
#   ios-static-routes-replaced:   populated → replaced (remove surplus) + idempotency
#   ios-static-routes-overridden: populated → overridden (remove surplus) + idempotency
#   ios-static-routes-deleted:    populated → empty + idempotency

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | include ^ip route .+ |^ipv6 route .+": "transcripts/cisco/ios/show_running-config_include_static_routes_populated.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  # ── merged: populated → merged names + partner_vrf ──────────────────────
  ios-static-routes-merged:
    platform: ios
    sequence:
      # get_facts (have) — populated baseline
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-merged/before_populated.txt"
      # edit_config: configure + 7 commands + end
      # dict_merge preserves haved order: global first, VRF second
      # Global ipv4 (haved order: 101.3, 101.2, 101.1), then global ipv6, then VRF ipv4, then VRF ipv6
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip route 198.51.100.0 255.255.255.0 198.51.101.3 name merged_route_3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip route 198.51.100.0 255.255.255.0 198.51.101.2 30 name merged_route_2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip route 198.51.100.0 255.255.255.0 198.51.101.1 110 tag 40 name merged_route_1 multicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 route 2001:DB8:0:3::/64 2001:DB8:0:3::2 tag 105 name merged_v6"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip route vrf ansible_temp_vrf 192.0.2.0 255.255.255.0 192.0.2.1 tag 50 name merged_vrf track 150"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ip route vrf ansible_temp_vrf 192.51.110.0 255.255.255.255 GigabitEthernet3 192.51.111.1 10 name partner_vrf"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "ipv6 route vrf ansible_temp_vrf 2001:DB8:0:4::/64 2001:DB8:0:4::2 tag 115 name merged_v6_vrf"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-merged/after_merged.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-merged/after_merged.txt"
      # idempotent: get_facts (after)
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-merged/after_merged.txt"

  # ── replaced: populated → replaced (VRF first, then global) ────────────
  ios-static-routes-replaced:
    platform: ios
    sequence:
      # get_facts (have) — populated
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-replaced/before_populated.txt"
      # edit_config: configure + 6 commands + end
      # wantd iteration: VRF first (config order), then global
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      # VRF ipv4: updated route
      - command: "ip route vrf ansible_temp_vrf 192.0.2.0 255.255.255.0 192.0.2.1 tag 75 name replaced_vrf track 155"
        transcript: "transcripts/generic_empty_return.txt"
      # VRF ipv6: updated route
      - command: "ipv6 route vrf ansible_temp_vrf 2001:DB8:0:4::/64 2001:DB8:0:4::2 tag 115 name replaced_v6_vrf"
        transcript: "transcripts/generic_empty_return.txt"
      # Global ipv4: want=101.1 only; have had 101.3, 101.2, 101.1
      - command: "ip route 198.51.100.0 255.255.255.0 198.51.101.1 175 tag 70 name replaced_route multicast"
        transcript: "transcripts/generic_empty_return.txt"
      # Negate surplus global ipv4 in have order (101.3, 101.2)
      - command: "no ip route 198.51.100.0 255.255.255.0 198.51.101.3 name route_3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip route 198.51.100.0 255.255.255.0 198.51.101.2 30 name route_2"
        transcript: "transcripts/generic_empty_return.txt"
      # Global ipv6: updated route
      - command: "ipv6 route 2001:DB8:0:3::/64 2001:DB8:0:3::2 tag 110 name replaced_v6"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-replaced/after_replaced.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-replaced/after_replaced.txt"
      # idempotent: get_facts (after)
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-replaced/after_replaced.txt"

  # ── overridden: populated → overridden (VRF first, then global) ────────
  ios-static-routes-overridden:
    platform: ios
    sequence:
      # get_facts (have) — populated
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-overridden/before_populated.txt"
      # edit_config: configure + 6 commands + end
      # wantd iteration: VRF first (config order), then global
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      # VRF ipv4: only name changes
      - command: "ip route vrf ansible_temp_vrf 192.0.2.0 255.255.255.0 192.0.2.1 tag 50 name override_vrf track 150"
        transcript: "transcripts/generic_empty_return.txt"
      # VRF ipv6: tag + name change
      - command: "ipv6 route vrf ansible_temp_vrf 2001:DB8:0:4::/64 2001:DB8:0:4::2 tag 135 name override_v6_vrf"
        transcript: "transcripts/generic_empty_return.txt"
      # Global ipv4: want=101.3 only; have had 101.3, 101.2, 101.1
      - command: "ip route 198.51.100.0 255.255.255.0 198.51.101.3 name override_route"
        transcript: "transcripts/generic_empty_return.txt"
      # Negate surplus global ipv4 in have order (101.2, 101.1 — 101.3 was popped by want match)
      - command: "no ip route 198.51.100.0 255.255.255.0 198.51.101.2 30 name route_2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip route 198.51.100.0 255.255.255.0 198.51.101.1 110 tag 40 name route_1 multicast"
        transcript: "transcripts/generic_empty_return.txt"
      # Global ipv6: tag + name change
      - command: "ipv6 route 2001:DB8:0:3::/64 2001:DB8:0:3::2 tag 175 name override_v6"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after)
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-overridden/after_overridden.txt"
      # idempotent: get_facts (have)
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-overridden/after_overridden.txt"
      # idempotent: get_facts (after)
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-overridden/after_overridden.txt"

  # ── deleted: populated → empty ─────────────────────────────────────────
  ios-static-routes-deleted:
    platform: ios
    sequence:
      # get_facts (have) — populated
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-deleted/before_populated.txt"
      # edit_config: configure + 6 negate commands + end
      # wantd iteration: VRF first (config order), then global
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      # VRF ipv4: negate
      - command: "no ip route vrf ansible_temp_vrf 192.0.2.0 255.255.255.0 192.0.2.1 tag 50 name test_vrf track 150"
        transcript: "transcripts/generic_empty_return.txt"
      # VRF ipv6: negate
      - command: "no ipv6 route vrf ansible_temp_vrf 2001:DB8:0:4::/64 2001:DB8:0:4::2 tag 115 name test_v6_vrf"
        transcript: "transcripts/generic_empty_return.txt"
      # Global ipv4: negate all in have order (101.3, 101.2, 101.1)
      - command: "no ip route 198.51.100.0 255.255.255.0 198.51.101.3 name route_3"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip route 198.51.100.0 255.255.255.0 198.51.101.2 30 name route_2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no ip route 198.51.100.0 255.255.255.0 198.51.101.1 110 tag 40 name route_1 multicast"
        transcript: "transcripts/generic_empty_return.txt"
      # Global ipv6: negate
      - command: "no ipv6 route 2001:DB8:0:3::/64 2001:DB8:0:3::2 tag 105 name test_v6"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      # get_facts (after) — empty
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-deleted/after_empty.txt"
      # idempotent: get_facts (have) — empty
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-deleted/after_empty.txt"
      # idempotent: get_facts (after) — empty
      - command: "show running-config | include ^ip route .+ |^ipv6 route .+"
        transcript: "transcripts/scenarios/ios-static-routes-deleted/after_empty.txt"
