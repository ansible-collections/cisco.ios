---
# Preview check_mode on stateful hosts first, then gathered/parsed/rendered, then full
# merged/deleted plays. Each new TCP session resets the CISSHGO scenario cursor.

- name: "Ios_vlans — merged check_mode (preview)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_vlans/vars/main.yaml"
  tasks:
    - name: "Merged — check_mode (preview)"
      cisco.ios.ios_vlans:
        config:
          - vlan_id: 100
            name: TEST_VLAN
            state: active
            shutdown: disabled
        state: merged
      check_mode: true
      register: cm_merged_preview

    - name: "Debug merged check_mode (preview)"
      ansible.builtin.debug:
        msg:
          changed: "{{ cm_merged_preview.changed }}"
          commands: "{{ cm_merged_preview.commands | default([]) }}"
          before: "{{ cm_merged_preview.before | default([]) }}"
          after: "{{ cm_merged_preview.after | default([]) }}"

- name: "Ios_vlans — deleted check_mode (preview)"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_vlans/vars/main.yaml"
  tasks:
    - name: "Deleted — check_mode (preview)"
      cisco.ios.ios_vlans:
        config:
          - vlan_id: 100
        state: deleted
      check_mode: true
      register: cm_deleted_preview

    - name: "Debug deleted check_mode (preview)"
      ansible.builtin.debug:
        msg:
          changed: "{{ cm_deleted_preview.changed }}"
          commands: "{{ cm_deleted_preview.commands | default([]) }}"
          before: "{{ cm_deleted_preview.before | default([]) }}"
          after: "{{ cm_deleted_preview.after | default([]) }}"

- name: "Ios_vlans — state: gathered"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_vlans/vars/main.yaml"
  tasks:
    - name: "Gather VLAN configuration"
      cisco.ios.ios_vlans:
        state: gathered
      register: result

    - name: "Assert gathered"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.gathered | length > 0
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — VLAN facts from CISSHGO fixture"

- name: "Ios_vlans — state: parsed (running_config from _parsed.cfg)"
  hosts: ios_parsed
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_vlans/vars/main.yaml"
  tasks:
    - name: "Parse VLANs from integration _parsed.cfg"
      cisco.ios.ios_vlans:
        running_config: "{{ lookup('file', playbook_dir ~ '/../../../tests/integration/targets/ios_vlans/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed structure"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.parsed | length > 0
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — _parsed.cfg"

- name: "Ios_vlans — state: rendered"
  hosts: ios_rendered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_vlans/vars/main.yaml"
  vars:
    ios_vlans_rendered_cmds:
      - vlan 100
      - name TEST_VLAN
      - state active
      - no shutdown
  tasks:
    - name: "Render VLAN configuration to CLI"
      cisco.ios.ios_vlans:
        config:
          - vlan_id: 100
            name: TEST_VLAN
            state: active
            shutdown: disabled
        state: rendered
      register: result

    - name: "Assert rendered commands"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - ios_vlans_rendered_cmds | symmetric_difference(result['rendered'] | default([])) | length == 0
        quiet: true

    - name: "PASSED: rendered state"
      ansible.builtin.debug:
        msg: "rendered state test passed — offline CLI projection"

- name: "Ios_vlans — state: merged (check_mode, apply, idempotency)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_vlans/vars/main.yaml"
  vars:
    ios_vlans_merged_cmds:
      - vlan 100
      - name TEST_VLAN
      - state active
      - no shutdown
  tasks:
    - name: "Merged — check_mode"
      cisco.ios.ios_vlans:
        config:
          - vlan_id: 100
            name: TEST_VLAN
            state: active
            shutdown: disabled
        state: merged
      check_mode: true
      register: cm_merged

    - name: "Debug merged check_mode"
      ansible.builtin.debug:
        msg:
          changed: "{{ cm_merged.changed }}"
          commands: "{{ cm_merged.commands | default([]) }}"
          before: "{{ cm_merged.before | default([]) }}"
          after: "{{ cm_merged.after | default([]) }}"

    - name: "Merge VLAN 100"
      cisco.ios.ios_vlans: &merged_vlans
        config:
          - vlan_id: 100
            name: TEST_VLAN
            state: active
            shutdown: disabled
        state: merged
      register: result

    - name: "Assert merged first apply"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - ios_vlans_merged_cmds | symmetric_difference(result['commands'] | default([])) | length == 0
        quiet: true

    - name: "Merge VLAN 100 — idempotent run"
      cisco.ios.ios_vlans: *merged_vlans
      register: result

    - name: "Assert merged idempotency"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — check_mode + apply + idempotency"

- name: "Ios_vlans — state: deleted (check_mode, apply, idempotency)"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_vlans/vars/main.yaml"
  vars:
    ios_vlans_deleted_cmds:
      - vlan 100
      - no name TEST_VLAN
      - no state active
      - shutdown
  tasks:
    - name: "Deleted — check_mode"
      cisco.ios.ios_vlans:
        config:
          - vlan_id: 100
        state: deleted
      check_mode: true
      register: cm_deleted

    - name: "Debug deleted check_mode"
      ansible.builtin.debug:
        msg:
          changed: "{{ cm_deleted.changed }}"
          commands: "{{ cm_deleted.commands | default([]) }}"
          before: "{{ cm_deleted.before | default([]) }}"
          after: "{{ cm_deleted.after | default([]) }}"

    - name: "Delete VLAN 100 attributes"
      cisco.ios.ios_vlans: &deleted_vlans
        config:
          - vlan_id: 100
        state: deleted
      register: result

    - name: "Assert deleted first apply"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - ios_vlans_deleted_cmds | symmetric_difference(result['commands'] | default([])) | length == 0
        quiet: true

    - name: "Delete VLAN 100 attributes — idempotent run"
      cisco.ios.ios_vlans: *deleted_vlans
      register: result

    - name: "Assert deleted idempotency"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: deleted state"
      ansible.builtin.debug:
        msg: "deleted state test passed — check_mode + apply + idempotency"
