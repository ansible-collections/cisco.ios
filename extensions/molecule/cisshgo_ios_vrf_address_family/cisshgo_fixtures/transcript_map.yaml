---
# CISSHGO transcript map — cisco.ios.ios_vrf_address_family (Molecule)
#
# Getter: show running-config | section ^vrf
#
# Like ios_vrf_global / ios_vrf_interfaces: check_mode + first apply task in one play
# share one SSH session and emit an extra "show ... section" while the device is
# unchanged, so merged/deleted scenarios begin with three duplicate getter transcripts
# before configure terminal.
#
# Each new Ansible play uses a new TCP session so CISSHGO restarts the scenario
# sequence from the top (required for separate check_mode-only preview plays).

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^vrf": "transcripts/cisco/ios/show_running-config_section_vrf_gathered.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  ios-vrf-af-merged:
    platform: ios
    sequence:
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-merged/before_empty.txt"
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-merged/before_empty.txt"
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-merged/before_empty.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "vrf definition test2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "address-family ipv4 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "export map testing-map1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "import map import-map1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "inter-as-hybrid csc next-hop 1.2.3.4"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "vrf definition test1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "address-family ipv4 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "export map testing-map"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "import map import-map"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-merged/after_merged.txt"
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-merged/after_merged.txt"

  ios-vrf-af-deleted:
    platform: ios
    sequence:
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-deleted/before_populated.txt"
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-deleted/before_populated.txt"
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-deleted/before_populated.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "vrf definition test1"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no no address-family ipv4 unicast"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-deleted/after_deleted.txt"
      - command: "show running-config | section ^vrf"
        transcript: "transcripts/scenarios/ios-vrf-af-deleted/after_deleted.txt"
