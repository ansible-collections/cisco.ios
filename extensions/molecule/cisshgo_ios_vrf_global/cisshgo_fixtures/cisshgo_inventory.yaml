---
# CISSHGO device inventory for ios_vrf_global Molecule tests.
#
# Stateful scenarios: ios-vrf-global-merged, ios-vrf-global-deleted.
# Extra platform rows back the gathered / parsed / rendered hosts on ports
# 10000 and 10003–10004 (see inventory/hosts.yml).
#
# Port map (CISSHGO_PORT default 10000):
#   10000: platform — cisshgo-ios-gathered
#   10001: ios-vrf-global-merged — cisshgo-ios-merged
#   10002: ios-vrf-global-deleted — cisshgo-ios-deleted
#   10003: platform — cisshgo-ios-parsed
#   10004: platform — cisshgo-ios-rendered

devices:
  - platform: ios
    count: 1

  - scenario: ios-vrf-global-merged
    count: 1

  - scenario: ios-vrf-global-deleted
    count: 1

  - platform: ios
    count: 1

  - platform: ios
    count: 1
