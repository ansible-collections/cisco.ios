---
# CISSHGO transcript map — cisco.ios.ios_vrf_interfaces (cisshgo molecule)
# Getter: show running-config | section ^interface
#
# check_mode: each merged/deleted task issues an extra "show ... section" after
# computing commands (device unchanged), so scenarios start with duplicate shows.

platforms:
  ios:
    vendor: "cisco"
    hostname: "cisshgo-ios"
    username: "admin"
    password: "admin"
    command_transcripts:
      "show privilege": "transcripts/cisco/ios/show_privilege.txt"
      "terminal length 0": "transcripts/generic_empty_return.txt"
      "terminal width 512": "transcripts/generic_empty_return.txt"
      "terminal width 0": "transcripts/generic_empty_return.txt"
      "show version": "transcripts/cisco/ios/show_version.txt"
      "show running-config": "transcripts/cisco/ios/show_running-config.txt"
      "show running-config | section ^interface": "transcripts/cisco/ios/show_running-config_section_interface_vrf_gathered.txt"
      "show vlan": "transcripts/generic_empty_return.txt"
      "write memory": "transcripts/generic_empty_return.txt"
      "write mem": "transcripts/generic_empty_return.txt"

    context_search:
      "configure terminal": "(config)#"
      "enable": "#"
      "base": "#"

    context_hierarchy:
      "(config)#": "#"
      "#": ">"

    end_context: "#"

scenarios:
  ios-vrf-intf-merged:
    platform: ios
    sequence:
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-merged/before_clean.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-merged/before_clean.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-merged/before_clean.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "interface GigabitEthernet2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "vrf forwarding vrf_D"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-merged/after_merged.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-merged/after_merged.txt"

  ios-vrf-intf-deleted:
    platform: ios
    sequence:
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-deleted/before_populated.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-deleted/before_populated.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-deleted/before_populated.txt"
      - command: "configure terminal"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "interface GigabitEthernet2"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "no vrf forwarding vrf_B"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "end"
        transcript: "transcripts/generic_empty_return.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-deleted/after_deleted.txt"
      - command: "show running-config | section ^interface"
        transcript: "transcripts/scenarios/ios-vrf-intf-deleted/after_deleted.txt"
