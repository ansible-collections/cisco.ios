---
# Inputs for the shared _shared/{create,destroy,verify}.yml playbooks.
# The shared playbooks derive both inventory paths from scenario_name:
#   inventories/cisshgo/<scenario>.yaml   (for cisshgo --inventory)
#   inventories/ansible/<scenario>.yaml   (for ansible-playbook converge)
scenario_name: interfaces
listener_ports:
  - 10000 # gathered / parsed / rendered
  - 10001 # merged
  - 10002 # replaced
