---
- name: "Gather ios_lldp_global facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_lldp_global/vars/main.yaml"
  tasks:
    - name: "Gather LLDP global facts from device"
      cisco.ios.ios_lldp_global:
        state: gathered
      register: result

    - name: "Assert gathered facts match expected config"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - gathered['config'] == result['gathered']
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — LLDP global resource gathered from fixture"

- name: "Merge ios_lldp_global configuration (merged state)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_lldp_global/vars/main.yaml"
  tasks:
    - name: "Merge LLDP global configuration"
      cisco.ios.ios_lldp_global:
        config:
          holdtime: 10
          enabled: true
          reinit: 3
          timer: 20
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - merged['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert before state matches expected"
      ansible.builtin.assert:
        that:
          - merged['before'] | dict2items | symmetric_difference(result['before'] | dict2items) | length == 0
        quiet: true

    - name: "Assert after state matches expected"
      ansible.builtin.assert:
        that:
          - merged['after'] | dict2items | symmetric_difference(result['after'] | dict2items) | length == 0
        quiet: true

    - name: "Merge LLDP global configuration — idempotent run"
      cisco.ios.ios_lldp_global:
        config:
          holdtime: 10
          enabled: true
          reinit: 3
          timer: 20
        state: merged
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — config applied + idempotency verified"

- name: "Replace ios_lldp_global configuration (replaced state)"
  hosts: ios_replaced
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_lldp_global/vars/main.yaml"
  tasks:
    - name: "Replace LLDP global configuration"
      cisco.ios.ios_lldp_global:
        config:
          holdtime: 20
          reinit: 5
        state: replaced
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - replaced['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert before state matches expected"
      ansible.builtin.assert:
        that:
          - replaced['before'] | dict2items | symmetric_difference(result['before'] | dict2items) | length == 0
        quiet: true

    - name: "Assert after state matches expected"
      ansible.builtin.assert:
        that:
          - replaced['after'] | dict2items | symmetric_difference(result['after'] | dict2items) | length == 0
        quiet: true

    - name: "Replace LLDP global configuration — idempotent run"
      cisco.ios.ios_lldp_global:
        config:
          holdtime: 20
          reinit: 5
        state: replaced
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: replaced state"
      ansible.builtin.debug:
        msg: "replaced state test passed — config replaced + idempotency verified"

- name: "Delete ios_lldp_global configuration (deleted state)"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_lldp_global/vars/main.yaml"
  tasks:
    - name: "Delete LLDP global configuration"
      cisco.ios.ios_lldp_global:
        state: deleted
      register: result

    - name: "Assert deleted commands match expected"
      ansible.builtin.assert:
        that:
          - deleted['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert deleted before state matches expected"
      ansible.builtin.assert:
        that:
          - deleted['before'] | dict2items | symmetric_difference(result['before'] | dict2items) | length == 0
        quiet: true

    - name: "Assert deleted after state matches expected"
      ansible.builtin.assert:
        that:
          - deleted['after'] | dict2items | symmetric_difference(result['after'] | dict2items) | length == 0
        quiet: true

    - name: "Delete LLDP global configuration — idempotent run"
      cisco.ios.ios_lldp_global:
        state: deleted
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: deleted state"
      ansible.builtin.debug:
        msg: "deleted state test passed"

- name: "Parse ios_lldp_global configuration from file (parsed state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_lldp_global/vars/main.yaml"
  tasks:
    - name: "Parse LLDP global configuration from file"
      cisco.ios.ios_lldp_global:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_lldp_global/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - parsed['config'] == result['parsed']
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — LLDP global parsed from _parsed.cfg"

- name: "Render ios_lldp_global configuration to CLI (rendered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_lldp_global/vars/main.yaml"
  tasks:
    - name: "Render LLDP global configuration to CLI commands"
      cisco.ios.ios_lldp_global:
        config:
          holdtime: 10
          enabled: true
          reinit: 3
          timer: 20
        state: rendered
      register: result

    - name: "Assert rendered commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - merged['commands'] | symmetric_difference(result['rendered']) | length == 0
        quiet: true

    - name: "PASSED: rendered state"
      ansible.builtin.debug:
        msg: "rendered state test passed — {{ result['rendered'] | length }} CLI commands rendered"
