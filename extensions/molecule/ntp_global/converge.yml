---
# Molecule converge: Run ios_ntp_global integration-style assertions against CISSHGO

# ============================================================================
# Play 1: ios_ntp_global — state: gathered (platform mode, stateless)
# ============================================================================
- name: "Gather ios_ntp_global facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ntp_global/vars/main.yaml"
  tasks:
    - name: "Gather NTP global facts from device"
      cisco.ios.ios_ntp_global:
        state: gathered
      register: result

    - name: "Assert gathered facts match expected config"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - gathered['config'] == result['gathered']
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — NTP global resource gathered from fixture"

# ============================================================================
# Play 2: ios_ntp_global — state: merged (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Merge ios_ntp_global configuration (merged state)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ntp_global/vars/main.yaml"
  tasks:
    - name: "Merge NTP global configuration"
      cisco.ios.ios_ntp_global:
        config:
          master:
            stratum: 4
          max_associations: 34
          max_distance: 3
          min_distance: 10
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - merged['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert after state matches expected"
      ansible.builtin.assert:
        that:
          - merged['after'] == result['after']
        quiet: true

    - name: "Merge NTP global configuration — idempotent run"
      cisco.ios.ios_ntp_global:
        config:
          master:
            stratum: 4
          max_associations: 34
          max_distance: 3
          min_distance: 10
        state: merged
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — config applied + idempotency verified"

# ============================================================================
# Play 3: ios_ntp_global — state: overridden (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Override ios_ntp_global configuration (overridden state)"
  hosts: ios_overridden
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ntp_global/vars/main.yaml"
  tasks:
    - name: "Override device NTP global configuration"
      cisco.ios.ios_ntp_global:
        config:
          broadcast_delay: 113
          orphan: 10
          servers:
            - server: 192.0.2.15
              key: 2
        state: overridden
      register: result

    - name: "Assert overridden commands"
      ansible.builtin.assert:
        that:
          - overridden['commands'] == result['commands']
        quiet: true

    - name: "Assert overridden before"
      ansible.builtin.assert:
        that:
          - overridden['before'] == result['before']
        quiet: true

    - name: "Assert overridden after"
      ansible.builtin.assert:
        that:
          - overridden['after'] == result['after']
        quiet: true

    - name: "Override device NTP global configuration (idempotent)"
      cisco.ios.ios_ntp_global:
        config:
          broadcast_delay: 113
          orphan: 10
          servers:
            - server: 192.0.2.15
              key: 2
        state: overridden
      register: result

    - name: "Assert overridden idempotent"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: overridden state"
      ansible.builtin.debug:
        msg: "overridden state test passed"

# ============================================================================
# Play 4: ios_ntp_global — state: deleted (scenario mode)
# ============================================================================
- name: "Delete ios_ntp_global configuration (deleted state)"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ntp_global/vars/main.yaml"
  tasks:
    - name: "Delete NTP global configuration"
      cisco.ios.ios_ntp_global:
        config:
        state: deleted
      register: result

    - name: "Assert deleted commands"
      ansible.builtin.assert:
        that:
          - deleted['commands'] == result['commands']
        quiet: true

    - name: "Assert deleted before"
      ansible.builtin.assert:
        that:
          - deleted['before'] == result['before']
        quiet: true

    - name: "Delete NTP global configuration — idempotent run"
      cisco.ios.ios_ntp_global:
        config:
        state: deleted
      register: result

    - name: "Assert deleted idempotent"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: deleted state"
      ansible.builtin.debug:
        msg: "deleted state test passed"

# ============================================================================
# Play 5: ios_ntp_global — state: parsed (offline; platform host)
# ============================================================================
- name: "Parse ios_ntp_global configuration from file (parsed state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ntp_global/vars/main.yaml"
  tasks:
    - name: "Parse NTP global configuration from file"
      cisco.ios.ios_ntp_global:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_ntp_global/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - parsed['config'] == result['parsed']
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — NTP global parsed from _parsed.cfg"

# ============================================================================
# Play 6: ios_ntp_global — state: rendered (offline)
# ============================================================================
- name: "Render ios_ntp_global configuration to CLI (rendered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ntp_global/vars/main.yaml"
  tasks:
    - name: "Render NTP global configuration to CLI commands"
      cisco.ios.ios_ntp_global:
        config:
          broadcast_delay: 22
          clock_period: 5
          logging: true
          master:
            stratum: 4
          max_associations: 34
          max_distance: 3
          min_distance: 10
          orphan: 4
          panic_update: true
          peers:
            - peer: 192.0.2.10
              version: 2
        state: rendered
      register: result

    - name: "Assert rendered commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - rendered['commands'] == result['rendered']
        quiet: true

    - name: "PASSED: rendered state"
      ansible.builtin.debug:
        msg: "rendered state test passed — {{ result['rendered'] | length }} CLI commands rendered"

# ============================================================================
# Play 7: ios_ntp_global — RTT (merged -> ios_facts -> replaced drift -> overridden revert)
# ============================================================================
- name: "Round-trip ios_ntp_global (RTT)"
  hosts: ios_rtt
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ntp_global/vars/main.yaml"
  tasks:
    - name: "RTT — base merge"
      cisco.ios.ios_ntp_global:
        config:
          min_distance: 10
          orphan: 4
          panic_update: true
        state: merged

    - name: "RTT — gather ntp_global via ios_facts"
      cisco.ios.ios_facts:
        gather_subset:
          - "!all"
          - "!min"
        gather_network_resources:
          - ntp_global

    - name: "RTT — drift (replaced)"
      cisco.ios.ios_ntp_global:
        config:
          max_distance: 3
          min_distance: 10
          orphan: 4
          panic_update: true
        state: replaced

    - name: "RTT — revert using gathered facts (overridden)"
      register: revert
      cisco.ios.ios_ntp_global:
        config: "{{ ansible_facts['network_resources']['ntp_global'] }}"
        state: overridden

    - name: "RTT — assert revert commands"
      ansible.builtin.assert:
        that:
          - revert.changed == true
          - revert['commands'] == rtt['commands']
        quiet: true
