---
- name: "Gather ios_ospfv3 facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ospfv3/vars/main.yaml"
  tasks:
    - name: "Gather OSPFv3 facts from device"
      cisco.ios.ios_ospfv3:
        state: gathered
      register: result

    - name: "Assert gathered facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - merged['after']['processes'] | symmetric_difference(result['gathered']['processes']) | length == 0
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — OSPFv3 config gathered from fixture"

- name: "Merge ios_ospfv3 configuration (merged state)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ospfv3/vars/main.yaml"
  tasks:
    - name: "Merge OSPFv3 configuration"
      cisco.ios.ios_ospfv3: &merged_config
        config:
          processes:
            - process_id: 1
              max_metric:
                router_lsa: true
                on_startup:
                  time: 110
              address_family:
                - afi: ipv4
                  unicast: true
                  vrf: ospf_vrf
                  adjacency:
                    min_adjacency: 25
                    max_adjacency: 25
                  areas:
                    - area_id: 25
                      nssa:
                        default_information_originate:
                          metric: 25
                          nssa_only: true
              areas:
                - area_id: "10"
                  nssa:
                    default_information_originate:
                      metric: 10
            - process_id: 200
              address_family:
                - afi: ipv4
                  unicast: true
                  adjacency:
                    min_adjacency: 200
                    max_adjacency: 200
              max_metric:
                router_lsa: true
                on_startup:
                  time: 100
              auto_cost:
                reference_bandwidth: 4
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - merged['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert before state is empty"
      ansible.builtin.assert:
        that:
          - merged['before'] == {}
        quiet: true

    - name: "Merge OSPFv3 configuration — idempotent run"
      cisco.ios.ios_ospfv3: *merged_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — config applied + idempotency verified"

