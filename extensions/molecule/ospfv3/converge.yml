- name: "Parse ios_ospfv3 configuration from file (parsed state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ospfv3/vars/main.yaml"
  tasks:
    - name: "Parse OSPFv3 configuration from file"
      cisco.ios.ios_ospfv3:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_ospfv3/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - merged['after']['processes'] | symmetric_difference(result['parsed']['processes']) | length == 0
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — OSPFv3 config parsed from _parsed.cfg"

- name: "Render ios_ospfv3 configuration to CLI (rendered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_ospfv3/vars/main.yaml"
  tasks:
    - name: "Render OSPFv3 configuration to CLI commands"
      cisco.ios.ios_ospfv3:
        config:
          processes:
            - process_id: 1
              max_metric:
                router_lsa: true
                on_startup:
                  time: 110
              address_family:
                - afi: ipv4
                  unicast: true
                  vrf: ospf_vrf
                  adjacency:
                    min_adjacency: 25
                    max_adjacency: 25
                  areas:
                    - area_id: 25
                      nssa:
                        default_information_originate:
                          metric: 25
                          nssa_only: true
              areas:
                - area_id: "10"
                  nssa:
                    default_information_originate:
                      metric: 10
            - process_id: 200
              address_family:
                - afi: ipv4
                  unicast: true
                  adjacency:
                    min_adjacency: 200
                    max_adjacency: 200
              max_metric:
                router_lsa: true
                on_startup:
                  time: 100
              auto_cost:
                reference_bandwidth: 4
        state: rendered
      register: result

    - name: "Assert rendered commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.rendered | symmetric_difference(merged.commands) == []
        quiet: true

    - name: "PASSED: rendered state"
      ansible.builtin.debug:
        msg: "rendered state test passed — {{ result['rendered'] | length }} CLI commands rendered"
