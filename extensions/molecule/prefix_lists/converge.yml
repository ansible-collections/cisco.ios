---
# Molecule converge: Run ios_prefix_lists integration-style assertions against CISSHGO

# ============================================================================
# Play 1: ios_prefix_lists — state: gathered (platform mode, stateless)
# ============================================================================
- name: "Gather ios_prefix_lists facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_prefix_lists/vars/main.yaml"
  tasks:
    - name: "Gather prefix lists facts from device"
      cisco.ios.ios_prefix_lists:
        state: gathered
      register: result

    - name: "Assert gathered facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - merged['after'] | symmetric_difference(result['gathered']) | length == 0
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — prefix lists gathered from fixture"

# ============================================================================
# Play 2: ios_prefix_lists — state: merged (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Merge ios_prefix_lists configuration (merged state)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_prefix_lists/vars/main.yaml"
  tasks:
    - name: "Merge prefix lists configuration"
      cisco.ios.ios_prefix_lists: &merged_config
        config:
          - afi: ipv4
            prefix_lists:
              - name: 10
                description: this is test description
                entries:
                  - action: deny
                    prefix: 1.0.0.0/8
                    le: 15
                    sequence: 5
                  - action: deny
                    prefix: 35.0.0.0/8
                    ge: 10
                    sequence: 10
                  - action: deny
                    prefix: 12.0.0.0/8
                    ge: 15
                    sequence: 15
                  - action: deny
                    prefix: 14.0.0.0/8
                    ge: 20
                    le: 21
                    sequence: 20
              - name: test
                description: this is test
                entries:
                  - action: deny
                    prefix: 12.0.0.0/8
                    ge: 15
                    sequence: 50
              - name: test_prefix
                description: this is for prefix-list
                entries:
                  - action: deny
                    prefix: 35.0.0.0/8
                    ge: 10
                    le: 15
                    sequence: 5
                  - action: deny
                    prefix: 35.0.0.0/8
                    ge: 20
                    sequence: 10
          - afi: ipv6
            prefix_lists:
              - name: test_ipv6
                description: this is ipv6 prefix-list
                entries:
                  - action: deny
                    prefix: 2001:DB8:0:4::/64
                    ge: 80
                    sequence: 10
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - merged['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert after state matches expected"
      ansible.builtin.assert:
        that:
          - merged['after'] | symmetric_difference(result['after']) | length == 0
        quiet: true

    - name: "Merge prefix lists configuration — idempotent run"
      cisco.ios.ios_prefix_lists: *merged_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — config applied + idempotency verified"

# ============================================================================
# Play 3: ios_prefix_lists — state: replaced (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Replace ios_prefix_lists configuration (replaced state)"
  hosts: ios_replaced
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_prefix_lists/vars/main.yaml"
  tasks:
    - name: "Replace prefix lists configuration"
      cisco.ios.ios_prefix_lists: &replaced_config
        config:
          - afi: ipv4
            prefix_lists:
              - name: 10
                description: this is replace test
                entries:
                  - action: deny
                    prefix: 12.0.0.0/8
                    ge: 15
                    sequence: 15
                  - action: deny
                    prefix: 14.0.0.0/8
                    ge: 20
                    le: 21
                    sequence: 20
              - name: test_replace
                description: this is replace test
                entries:
                  - action: deny
                    prefix: 35.0.0.0/8
                    ge: 20
                    sequence: 10
          - afi: ipv6
            prefix_lists:
              - name: test_ipv6
                entries:
                  - action: deny
                    prefix: 2001:DB8:0:4::/64
                    ge: 80
                    le: 100
                    sequence: 10
        state: replaced
      register: result

    - name: "Assert before state matches expected"
      ansible.builtin.assert:
        that:
          - merged['after'] | symmetric_difference(result['before']) | length == 0
        quiet: true

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - replaced['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert after state matches expected"
      ansible.builtin.assert:
        that:
          - replaced['after'] | symmetric_difference(result['after']) | length == 0
        quiet: true

    - name: "Replace prefix lists configuration — idempotent run"
      cisco.ios.ios_prefix_lists: *replaced_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: replaced state"
      ansible.builtin.debug:
        msg: "replaced state test passed — config replaced + idempotency verified"

# ============================================================================
# Play 4: ios_prefix_lists — state: overridden (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Override ios_prefix_lists configuration (overridden state)"
  hosts: ios_overridden
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_prefix_lists/vars/main.yaml"
  tasks:
    - name: "Override prefix lists configuration"
      cisco.ios.ios_prefix_lists: &overridden_config
        config:
          - afi: ipv4
            prefix_lists:
              - description: this is override test
                entries:
                  - action: deny
                    ge: 15
                    prefix: 12.0.0.0/8
                    sequence: 15
                  - action: deny
                    ge: 20
                    le: 21
                    prefix: 14.0.0.0/8
                    sequence: 20
                name: "10"
              - description: this is override test
                entries:
                  - action: deny
                    ge: 20
                    prefix: 35.0.0.0/8
                    sequence: 10
                name: test_override
          - afi: ipv6
            prefix_lists:
              - entries:
                  - action: deny
                    ge: 80
                    le: 100
                    prefix: 2001:DB8:0:4::/64
                    sequence: 10
                name: test_ipv6
        state: overridden
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - overridden['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert after state matches expected"
      ansible.builtin.assert:
        that:
          - overridden['after'] | symmetric_difference(result['after']) | length == 0
        quiet: true

    - name: "Override prefix lists configuration — idempotent run"
      cisco.ios.ios_prefix_lists: *overridden_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: overridden state"
      ansible.builtin.debug:
        msg: "overridden state test passed — config overridden + idempotency verified"

# ============================================================================
# Play 5: ios_prefix_lists — state: deleted (scenario mode, deleted_all)
# ============================================================================
- name: "Delete ios_prefix_lists configuration (deleted state)"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_prefix_lists/vars/main.yaml"
  tasks:
    - name: "Delete all prefix lists configuration"
      cisco.ios.ios_prefix_lists: &deleted_config
        state: deleted
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - deleted_all['commands'] | symmetric_difference(result['commands']) | length == 0
        quiet: true

    - name: "Assert before state matches expected"
      ansible.builtin.assert:
        that:
          - deleted_all['before'] | symmetric_difference(result['before']) | length == 0
        quiet: true

    - name: "Assert after state is empty"
      ansible.builtin.assert:
        that:
          - result['after'] == {}
        quiet: true

    - name: "Delete all prefix lists configuration — idempotent run"
      cisco.ios.ios_prefix_lists: *deleted_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: deleted state"
      ansible.builtin.debug:
        msg: "deleted state test passed — all prefix lists removed + idempotency verified"

# ============================================================================
# Play 6: ios_prefix_lists — state: parsed (offline; platform host)
# ============================================================================
- name: "Parse ios_prefix_lists configuration from file (parsed state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_prefix_lists/vars/main.yaml"
  tasks:
    - name: "Parse prefix lists configuration from file"
      cisco.ios.ios_prefix_lists:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_prefix_lists/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - merged['after'] | symmetric_difference(result['parsed']) | length == 0
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — prefix lists parsed from _parsed.cfg"

# ============================================================================
# Play 7: ios_prefix_lists — state: rendered (offline)
# ============================================================================
- name: "Render ios_prefix_lists configuration to CLI (rendered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_prefix_lists/vars/main.yaml"
  tasks:
    - name: "Render prefix lists configuration to CLI commands"
      cisco.ios.ios_prefix_lists:
        config:
          - afi: ipv4
            prefix_lists:
              - name: 10
                description: this is test description
                entries:
                  - action: deny
                    prefix: 1.0.0.0/8
                    le: 15
                    sequence: 5
                  - action: deny
                    prefix: 35.0.0.0/8
                    ge: 10
                    sequence: 10
                  - action: deny
                    prefix: 12.0.0.0/8
                    ge: 15
                    sequence: 15
                  - action: deny
                    prefix: 14.0.0.0/8
                    ge: 20
                    le: 21
                    sequence: 20
              - name: test
                description: this is test
                entries:
                  - action: deny
                    prefix: 12.0.0.0/8
                    ge: 15
                    sequence: 50
              - name: test_prefix
                description: this is for prefix-list
                entries:
                  - action: deny
                    prefix: 35.0.0.0/8
                    ge: 10
                    le: 15
                    sequence: 5
                  - action: deny
                    prefix: 35.0.0.0/8
                    ge: 20
                    sequence: 10
          - afi: ipv6
            prefix_lists:
              - name: test_ipv6
                description: this is ipv6 prefix-list
                entries:
                  - action: deny
                    prefix: 2001:DB8:0:4::/64
                    ge: 80
                    sequence: 10
        state: rendered
      register: result

    - name: "Assert rendered commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result['rendered'] | symmetric_difference(merged['commands']) | length == 0
        quiet: true

    - name: "PASSED: rendered state"
      ansible.builtin.debug:
        msg: "rendered state test passed — {{ result['rendered'] | length }} CLI commands rendered"
