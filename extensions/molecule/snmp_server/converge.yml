---
# Molecule converge: Run ios_snmp_server integration-style assertions against CISSHGO

# ============================================================================
# Play 1: ios_snmp_server — state: gathered (platform mode, stateless)
# ============================================================================
- name: "Gather ios_snmp_server facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_snmp_server/vars/main.yaml"
  tasks:
    - name: "Gather SNMP server facts from device"
      cisco.ios.ios_snmp_server:
        state: gathered
      register: result

    - name: "Assert gathered facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - gathered['config'] == result['gathered']
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — SNMP server gathered from fixture"

# ============================================================================
# Play 2: ios_snmp_server — state: merged (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Merge ios_snmp_server configuration (merged state)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_snmp_server/vars/main.yaml"
  tasks:
    - name: "Merge SNMP server configuration"
      cisco.ios.ios_snmp_server: &merged_config
        config:
          location: "in the racks"
          contact: "john@doe.org"
          packet_size: 900
          communities:
            - acl_v4: ADMIN-SUP
              name: community_name
              ro: true
            - acl_v4: test_Acl
              name: integrationComm
              rw: true
          hosts:
            - community_string: integrationComm
              host: 192.0.2.10
              informs: true
              traps:
                - isis
              version: 2c
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - merged['commands'] == result['commands']
        quiet: true

    - name: "Assert after state matches expected"
      ansible.builtin.assert:
        that:
          - merged['after'] == result['after']
        quiet: true

    - name: "Merge SNMP server configuration — idempotent run"
      cisco.ios.ios_snmp_server: *merged_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — config applied + idempotency verified"

# ============================================================================
# Play 3: ios_snmp_server — state: overridden (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Override ios_snmp_server configuration (overridden state)"
  hosts: ios_overridden
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_snmp_server/vars/main.yaml"
  tasks:
    - name: "Override SNMP server configuration"
      cisco.ios.ios_snmp_server: &overridden_config
        config:
          location: "location entry for snmp"
          packet_size: 500
          communities:
            - acl_v4: acl_uq
              name: communityOvverriden
              rw: true
        state: overridden
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - overridden['commands'] == result['commands']
        quiet: true

    - name: "Assert before state matches expected"
      ansible.builtin.assert:
        that:
          - overridden['before'] == result['before']
        quiet: true

    - name: "Assert after state matches expected"
      ansible.builtin.assert:
        that:
          - overridden['after'] == result['after']
        quiet: true

    - name: "Override SNMP server configuration — idempotent run"
      cisco.ios.ios_snmp_server: *overridden_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: overridden state"
      ansible.builtin.debug:
        msg: "overridden state test passed — config overridden + idempotency verified"

# ============================================================================
# Play 4: ios_snmp_server — state: deleted (scenario mode)
# ============================================================================
- name: "Delete ios_snmp_server configuration (deleted state)"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_snmp_server/vars/main.yaml"
  tasks:
    - name: "Delete all SNMP server configuration"
      cisco.ios.ios_snmp_server: &deleted_config
        state: deleted
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - deleted['commands'] == result['commands']
        quiet: true

    - name: "Assert before state matches expected"
      ansible.builtin.assert:
        that:
          - deleted['before'] == result['before']
        quiet: true

    - name: "Delete all SNMP server configuration — idempotent run"
      cisco.ios.ios_snmp_server: *deleted_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: deleted state"
      ansible.builtin.debug:
        msg: "deleted state test passed — SNMP server deleted + idempotency verified"

# ============================================================================
# Play 5: ios_snmp_server — state: parsed (offline; platform host)
# ============================================================================
- name: "Parse ios_snmp_server configuration from file (parsed state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_snmp_server/vars/main.yaml"
  tasks:
    - name: "Parse SNMP server configuration from file"
      cisco.ios.ios_snmp_server:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_snmp_server/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - parsed['config'] == result['parsed']
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — SNMP server parsed from _parsed.cfg"

# ============================================================================
# Play 6: ios_snmp_server — state: rendered (offline)
# ============================================================================
- name: "Render ios_snmp_server configuration to CLI (rendered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_snmp_server/vars/main.yaml"
  tasks:
    - name: "Render SNMP server configuration to CLI commands"
      cisco.ios.ios_snmp_server:
        config:
          communities:
            - acl_v4: test_Acl
              name: integrationComm
              rw: true
          contact: "contact updated using play"
          inform:
            pending: 2
          ip:
            dscp: 2
          location: "location entry for snmp"
          packet_size: 500
          system_shutdown: true
          engine_id:
            - id: AB0C5342FF0F
              remote:
                host: 192.0.2.12
                udp_port: 25
        state: rendered
      register: result

    - name: "Assert rendered commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result['rendered'] == rendered['commands']
        quiet: true

    - name: "PASSED: rendered state"
      ansible.builtin.debug:
        msg: "rendered state test passed — {{ result['rendered'] | length }} CLI commands rendered"
