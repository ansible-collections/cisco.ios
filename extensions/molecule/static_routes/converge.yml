    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands | length == 0
        quiet: true

    - name: "PASSED: overridden state"
      ansible.builtin.debug:
        msg: "overridden state test passed — config overridden + idempotency verified"

# ============================================================================
# Play 5: ios_static_routes — state: deleted (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Delete ios_static_routes configuration (deleted state)"
  hosts: ios_deleted
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_static_routes/vars/main.yaml"
  tasks:
    - name: "Delete static routes configuration"
      cisco.ios.ios_static_routes: &deleted_config
        config:
          - vrf: ansible_temp_vrf
            address_families:
              - afi: ipv4
                routes:
                  - dest: 192.0.2.0/24
                    next_hops:
                      - forward_router_address: 192.0.2.1
                        name: test_vrf
                        tag: 50
                        track: 150
              - afi: ipv6
                routes:
                  - dest: 2001:DB8:0:4::/64
                    next_hops:
                      - forward_router_address: 2001:DB8:0:4::2
                        name: test_v6_vrf
                        tag: 115
          - address_families:
              - afi: ipv4
                routes:
                  - dest: 198.51.100.0/24
                    next_hops:
                      - forward_router_address: 198.51.101.1
                        name: route_1
                        distance_metric: 110
                        tag: 40
                        multicast: true
                      - forward_router_address: 198.51.101.2
                        name: route_2
                        distance_metric: 30
                      - forward_router_address: 198.51.101.3
                        name: route_3
              - afi: ipv6
                routes:
                  - dest: 2001:DB8:0:3::/64
                    next_hops:
                      - forward_router_address: 2001:DB8:0:3::2
                        name: test_v6
                        tag: 105
        state: deleted
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - result.commands | length == 6
          - result.commands | symmetric_difference(deleted.commands) == []
        quiet: true

    - name: "Delete static routes configuration — idempotent run"
      cisco.ios.ios_static_routes: *deleted_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands | length == 0
        quiet: true

    - name: "PASSED: deleted state"
      ansible.builtin.debug:
        msg: "deleted state test passed — all specified routes removed + idempotency verified"

# ============================================================================
# Play 6: ios_static_routes — state: parsed (offline; platform host)
# ============================================================================
- name: "Parse ios_static_routes configuration from file (parsed state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_static_routes/vars/main.yaml"
  tasks:
    - name: "Parse static routes configuration from file"
      cisco.ios.ios_static_routes:
        running_config: "{{ lookup('file', '../../../tests/integration/targets/ios_static_routes/tests/cli/_parsed.cfg') }}"
        state: parsed
      register: result

    - name: "Assert parsed facts match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - parsed_data == result['parsed']
        quiet: true

    - name: "PASSED: parsed state"
      ansible.builtin.debug:
        msg: "parsed state test passed — static routes parsed from _parsed.cfg"

# ============================================================================
# Play 7: ios_static_routes — state: rendered (offline)
# ============================================================================
- name: "Render ios_static_routes configuration to CLI (rendered state)"
  hosts: ios_gathered
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_static_routes/vars/main.yaml"
  tasks:
    - name: "Render static routes configuration to CLI commands"
      cisco.ios.ios_static_routes:
        config:
          - vrf: ansible_temp_vrf
            address_families:
              - afi: ipv4
                routes:
                  - dest: 192.0.2.0/24
                    next_hops:
                      - forward_router_address: 192.0.2.1
                        name: test_vrf
                        tag: 50
                        track: 150
              - afi: ipv6
                routes:
                  - dest: 2001:DB8:0:4::/64
                    next_hops:
                      - forward_router_address: 2001:DB8:0:4::2
                        name: test_v6_vrf
                        tag: 115
          - address_families:
              - afi: ipv4
                routes:
                  - dest: 198.51.100.0/24
                    next_hops:
                      - forward_router_address: 198.51.101.1
                        name: route_1
                        distance_metric: 110
                        tag: 40
                        multicast: true
                      - forward_router_address: 198.51.101.2
                        name: route_2
                        distance_metric: 30
                      - forward_router_address: 198.51.101.3
                        name: route_3
              - afi: ipv6
                routes:
                  - dest: 2001:DB8:0:3::/64
                    next_hops:
                      - forward_router_address: 2001:DB8:0:3::2
                        name: test_v6
                        tag: 105
        state: rendered
      register: result

    - name: "Assert rendered commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.rendered | symmetric_difference(rendered.commands) == []
        quiet: true

    - name: "PASSED: rendered state"
      ansible.builtin.debug:
        msg: "rendered state test passed — {{ result['rendered'] | length }} CLI commands rendered"
