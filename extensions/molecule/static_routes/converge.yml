---
# Molecule converge: Run ios_static_routes integration-style assertions against CISSHGO

# ============================================================================
# Play 1: ios_static_routes — state: gathered (platform mode, stateless)
# ============================================================================
- name: "Gather ios_static_routes facts (gathered state)"
  hosts: ios_gathered
  gather_facts: false
  tasks:
    - name: "Gather static routes facts from device"
      cisco.ios.ios_static_routes:
        state: gathered
      register: result

    - name: "Assert gathered returned no changes"
      ansible.builtin.assert:
        that:
          - result.changed == false
        quiet: true

    - name: "PASSED: gathered state"
      ansible.builtin.debug:
        msg: "gathered state test passed — static routes gathered from fixture"

# ============================================================================
# Play 2: ios_static_routes — state: merged (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Merge ios_static_routes configuration (merged state)"
  hosts: ios_merged
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_static_routes/vars/main.yaml"
  tasks:
    - name: "Merge static routes configuration"
      cisco.ios.ios_static_routes: &merged_config
        config:
          - vrf: ansible_temp_vrf
            address_families:
              - afi: ipv4
                routes:
                  - dest: 192.0.2.0/24
                    next_hops:
                      - forward_router_address: 192.0.2.1
                        name: merged_vrf
                        tag: 50
                        track: 150
                  - dest: 192.51.110.0/32
                    next_hops:
                      - distance_metric: 10
                        forward_router_address: 192.51.111.1
                        interface: GigabitEthernet3
                        name: partner_vrf
              - afi: ipv6
                routes:
                  - dest: 2001:DB8:0:4::/64
                    next_hops:
                      - forward_router_address: 2001:DB8:0:4::2
                        name: merged_v6_vrf
                        tag: 115

          - address_families:
              - afi: ipv4
                routes:
                  - dest: 198.51.100.0/24
                    next_hops:
                      - forward_router_address: 198.51.101.1
                        name: merged_route_1
                        distance_metric: 110
                        tag: 40
                        multicast: true
                      - forward_router_address: 198.51.101.2
                        name: merged_route_2
                        distance_metric: 30
                      - forward_router_address: 198.51.101.3
                        name: merged_route_3
              - afi: ipv6
                routes:
                  - dest: 2001:DB8:0:3::/64
                    next_hops:
                      - forward_router_address: 2001:DB8:0:3::2
                        name: merged_v6
                        tag: 105
        state: merged
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - result.commands | length == 7
          - result.commands | symmetric_difference(merged.commands) == []
        quiet: true

    - name: "Merge static routes configuration — idempotent run"
      cisco.ios.ios_static_routes: *merged_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands | length == 0
        quiet: true

    - name: "PASSED: merged state"
      ansible.builtin.debug:
        msg: "merged state test passed — config applied + idempotency verified"

# ============================================================================
# Play 3: ios_static_routes — state: replaced (scenario mode, stateful + idempotent)
# ============================================================================
- name: "Replace ios_static_routes configuration (replaced state)"
  hosts: ios_replaced
  gather_facts: false
  vars_files:
    - "../../../tests/integration/targets/ios_static_routes/vars/main.yaml"
  tasks:
    - name: "Replace static routes configuration"
      cisco.ios.ios_static_routes: &replaced_config
        config:
          - vrf: ansible_temp_vrf
            address_families:
              - afi: ipv4
                routes:
                  - dest: 192.0.2.0/24
                    next_hops:
                      - forward_router_address: 192.0.2.1
                        name: replaced_vrf
                        tag: 75
                        track: 155
              - afi: ipv6
                routes:
                  - dest: 2001:DB8:0:4::/64
                    next_hops:
                      - forward_router_address: 2001:DB8:0:4::2
                        name: replaced_v6_vrf
                        tag: 115
          - address_families:
              - afi: ipv4
                routes:
                  - dest: 198.51.100.0/24
                    next_hops:
                      - forward_router_address: 198.51.101.1
                        name: replaced_route
                        distance_metric: 175
                        tag: 70
                        multicast: true
              - afi: ipv6
                routes:
                  - dest: 2001:DB8:0:3::/64
                    next_hops:
                      - forward_router_address: 2001:DB8:0:3::2
                        name: replaced_v6
                        tag: 110
        state: replaced
      register: result

    - name: "Assert generated commands match expected"
      ansible.builtin.assert:
        that:
          - result.changed == true
          - result.commands | symmetric_difference(replaced.commands) == []
        quiet: true

    - name: "Replace static routes configuration — idempotent run"
      cisco.ios.ios_static_routes: *replaced_config
      register: result

    - name: "Assert idempotent — no changes on second run"
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands | length == 0
        quiet: true

    - name: "PASSED: replaced state"
      ansible.builtin.debug:
        msg: "replaced state test passed — config replaced + idempotency verified"

# ============================================================================
