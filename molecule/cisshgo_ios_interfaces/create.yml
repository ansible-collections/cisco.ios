---
# Molecule create: Build and start CISSHGO SSH fixture server
#
# This playbook:
#   1. Locates or builds the cisshgo binary
#   2. Starts cisshgo with the ios_interfaces transcript fixtures
#   3. Waits for all ports (10000-10002) to be ready
#
# Environment variables:
#   CISSHGO_REPO_PATH  - Path to the cisshgo source repo (required for build)
#   CISSHGO_BIN_PATH   - Path to pre-built cisshgo binary (optional, skips build)
#   CISSHGO_PORT       - Starting port (default: 10000)

- name: "CISSHGO - Build and start SSH fixture server"
  hosts: localhost
  gather_facts: true
  vars:
    cisshgo_repo_path: "{{ lookup('env', 'CISSHGO_REPO_PATH') | default(playbook_dir + '/../../../../../cisshgo', true) }}"
    cisshgo_bin_path: "{{ lookup('env', 'CISSHGO_BIN_PATH') | default('', true) }}"
    cisshgo_starting_port: "{{ lookup('env', 'CISSHGO_PORT') | default('10000', true) }}"
    cisshgo_fixture_dir: "{{ playbook_dir }}/cisshgo_fixtures"
    cisshgo_log_file: "{{ playbook_dir }}/.cisshgo.log"
    cisshgo_pid_file: "{{ playbook_dir }}/.cisshgo.pid"
    # Number of ports to wait for (1 platform + N scenarios from cisshgo_inventory.yaml)
    cisshgo_port_count: 3

  tasks:
    - name: "Resolve cisshgo binary path"
      ansible.builtin.set_fact:
        cisshgo_binary: >-
          {%- if cisshgo_bin_path != '' -%}
            {{ cisshgo_bin_path }}
          {%- else -%}
            {{ cisshgo_repo_path }}/cisshgo
          {%- endif -%}

    - name: "Check if cisshgo binary exists"
      ansible.builtin.stat:
        path: "{{ cisshgo_binary | trim }}"
      register: cisshgo_bin_stat

    - name: "Build cisshgo from source"
      when: not cisshgo_bin_stat.stat.exists
      block:
        - name: "Verify cisshgo source repo exists"
          ansible.builtin.stat:
            path: "{{ cisshgo_repo_path }}/cissh.go"
          register: cisshgo_source_stat
          failed_when: not cisshgo_source_stat.stat.exists

        - name: "Build cisshgo binary"
          ansible.builtin.command:
            cmd: "go build -o cisshgo cissh.go"
            chdir: "{{ cisshgo_repo_path }}"
          changed_when: true

        - name: "Verify build succeeded"
          ansible.builtin.stat:
            path: "{{ cisshgo_binary | trim }}"
          register: cisshgo_post_build
          failed_when: not cisshgo_post_build.stat.exists

    - name: "Check if cisshgo is already running on port {{ cisshgo_starting_port }}"
      ansible.builtin.shell: |
        lsof -ti:{{ cisshgo_starting_port }} 2>/dev/null || true
      register: port_check
      changed_when: false

    - name: "Stop existing cisshgo instance"
      when: port_check.stdout | trim != ''
      ansible.builtin.shell: |
        kill {{ port_check.stdout | trim }} 2>/dev/null || true
        sleep 1
      changed_when: true

    - name: "Start cisshgo SSH fixture server"
      ansible.builtin.shell: |
        nohup {{ cisshgo_binary | trim }} \
          -t {{ cisshgo_fixture_dir }}/transcript_map.yaml \
          -i {{ cisshgo_fixture_dir }}/cisshgo_inventory.yaml \
          -p {{ cisshgo_starting_port }} \
          > {{ cisshgo_log_file }} 2>&1 &
        echo $! > {{ cisshgo_pid_file }}
      changed_when: true

    - name: "Wait for cisshgo ports to be ready"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ cisshgo_starting_port | int + item }}"
        delay: 1
        timeout: 15
      loop: "{{ range(cisshgo_port_count | int) | list }}"
      loop_control:
        label: "port {{ cisshgo_starting_port | int + item }}"

    - name: "Confirm cisshgo is running"
      ansible.builtin.debug:
        msg: >-
          CISSHGO started successfully.
          PID: {{ lookup('file', cisshgo_pid_file) }}.
          Ports: {{ cisshgo_starting_port }}-{{ cisshgo_starting_port | int + cisshgo_port_count | int - 1 }}.
          Log: {{ cisshgo_log_file }}
