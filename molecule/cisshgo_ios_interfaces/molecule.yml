---
# Molecule scenario: ios_interfaces tests using CISSHGO SSH fixture server
#
# This scenario tests the cisco.ios.ios_interfaces module against CISSHGO
# instead of real Cisco devices or CML labs. CISSHGO provides deterministic,
# fast, parallel-friendly test execution by replaying pre-recorded SSH transcripts.
#
# Ports:
#   10000 - Platform mode (stateless) - for gathered/parsed/rendered tests
#   10001 - Scenario mode (ios-interfaces-merged) - for merged state tests
#   10002 - Scenario mode (ios-interfaces-replaced) - for replaced state tests
#
# Usage:
#   molecule test -s cisshgo_ios_interfaces
#   molecule converge -s cisshgo_ios_interfaces    # run tests only
#   molecule destroy -s cisshgo_ios_interfaces     # cleanup only

dependency:
  name: galaxy

driver:
  name: default
  options:
    managed: false

platforms:
  - name: cisshgo-ios-gathered
    groups:
      - ios_platform
      - ios_gathered
  - name: cisshgo-ios-merged
    groups:
      - ios_merged
  - name: cisshgo-ios-replaced
    groups:
      - ios_replaced

provisioner:
  name: ansible
  inventory:
    host_vars:
      cisshgo-ios-gathered:
        ansible_host: 127.0.0.1
        ansible_port: 10000
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_user: admin
        ansible_password: admin
        ansible_become: false
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      cisshgo-ios-merged:
        ansible_host: 127.0.0.1
        ansible_port: 10001
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_user: admin
        ansible_password: admin
        ansible_become: false
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      cisshgo-ios-replaced:
        ansible_host: 127.0.0.1
        ansible_port: 10002
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_user: admin
        ansible_password: admin
        ansible_become: false
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  env:
    ANSIBLE_PERSISTENT_CONNECT_TIMEOUT: "30"
    ANSIBLE_PERSISTENT_COMMAND_TIMEOUT: "30"
    ANSIBLE_HOST_KEY_CHECKING: "false"
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/tests/integration/targets"

verifier:
  name: ansible
