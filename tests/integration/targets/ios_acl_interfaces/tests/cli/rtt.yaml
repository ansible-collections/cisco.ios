---
- ansible.builtin.debug:
    msg: START ios_acl_interfaces round trip integration tests on connection={{ ansible_connection }}

- ansible.builtin.include_tasks: _remove_config.yaml

- block:
    - name: Apply the provided configuration (base config)
      register: base_config
      cisco.ios.ios_acl_interfaces:
        config:
          - name: GigabitEthernet2
            access_groups:
              - afi: ipv4
                acls:
                  - name: 110
                    direction: in

                  - name: 123
                    direction: out

              - afi: ipv6
                acls:
                  - name: temp_v6
                    direction: in

                  - name: test_v6
                    direction: out

          - name: GigabitEthernet3
            access_groups:
              - afi: ipv4
                acls:
                  - name: 110
                    direction: in

                  - name: 123
                    direction: out
        state: merged

    - name: Gather ACL interfaces facts
      cisco.ios.ios_facts:
        gather_subset:
          - "!all"
          - "!min"
        gather_network_resources:
          - acl_interfaces

    - name: Apply the provided configuration (config to be reverted)
      register: result
      cisco.ios.ios_acl_interfaces:
        config:
          - name: GigabitEthernet2
            access_groups:
              - afi: ipv4
                acls:
                  - name: 100
                    direction: out

                  - name: 110
                    direction: in
        state: overridden

    - ansible.builtin.assert:
        that:
          - result.changed == true
          - "{{ overridden.commands | cisco.ios.commands_blocks_equal(result.commands, 'interface') }}"
    - name: Revert back to base configuration using facts round trip
      register: revert
      cisco.ios.ios_acl_interfaces:
        config: "{{ ansible_facts['network_resources']['acl_interfaces'] }}"
        state: overridden

    - ansible.builtin.assert:
        that:
          - revert.changed == true
          - "{{ revert.commands | cisco.ios.commands_blocks_equal(rtt.commands, 'interface') }}"
  always:
    - ansible.builtin.include_tasks: _remove_config.yaml
