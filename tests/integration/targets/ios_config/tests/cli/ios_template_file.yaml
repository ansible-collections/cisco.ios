---
- name: Test start msg for ios_config template file tests
  ansible.builtin.debug:
    msg: "START ios_config/ios_template_file.yaml on connection={{ ansible_connection }}"

- name: Show what lookup will render
  ansible.builtin.debug:
    msg: "Rendered template: {{ lookup('ansible.builtin.template', 'templates/basic/config_src_not_recommended.j2') }}"

- name: Apply configuration from file - not recommended (tests backward compatibility)
  register: result
  cisco.ios.ios_config:
    src: templates/basic/config_src_not_recommended.j2

- name: Assert backward compatible src with Jinja2 template file still applies config
  ansible.builtin.assert:
    that:
      - result.changed == true

- name: Cleanup - remove loopback after not-recommended test
  cisco.ios.ios_config:
    lines:
      - no interface Loopback998
  ignore_errors: true
# -------------------------------------------------------------------------
# RECOMMENDED: use content parameter with inline template lookup directly
# No need to write to disk first - render and pass in one step
# -------------------------------------------------------------------------
- name: Apply configuration using content parameter with inline template lookup - recommended way
  register: result
  cisco.ios.ios_config:
    content: "{{ lookup('ansible.builtin.template', 'templates/basic/config_src_recommended.j2') }}"

- name: Assert content parameter applied configuration correctly
  ansible.builtin.assert:
    that:
      - result.changed == true

- name: Cleanup - remove loopback interface
  cisco.ios.ios_config:
    lines:
      - no interface Loopback998

- name: Test end msg for ios_config template file tests
  ansible.builtin.debug:
    msg: "END ios_config/ios_template_file.yaml on connection={{ ansible_connection }}"
