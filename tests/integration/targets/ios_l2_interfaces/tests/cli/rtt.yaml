---
- ansible.builtin.debug:
    msg: START ios_l2_interfaces round trip integration tests on connection={{ ansible_connection }}

- block:
    - ansible.builtin.include_tasks: _remove_config.yaml
  when: ansible_net_version == "15.6(2)T"

- block:
    - name: Apply the provided configuration (base config)
      register: base_config
      cisco.ios.ios_l2_interfaces:
        config:
          - name: GigabitEthernet2
            access:
              vlan: 30
          - mode: trunk
            name: GigabitEthernet3
            trunk:
              allowed_vlans: 15-20,40
              native_vlan: 20
              pruning_vlans: 10,20
              encapsulation: dot1q
        state: merged

    - name: Gather layer 2 interfaces facts
      cisco.ios.ios_facts:
        gather_subset:
          - "!all"
          - "!min"
        gather_network_resources:
          - l2_interfaces

    - name: Apply the provided configuration (config to be reverted)
      register: result
      cisco.ios.ios_l2_interfaces:
        config:
          - name: GigabitEthernet3
            trunk:
              allowed_vlans: 30-35,40
              native_vlan: 30
              encapsulation: isl
        state: overridden

    - ansible.builtin.assert:
        that:
          - result.commands|length == 8
          - result.changed == true
          - "{{ overridden.commands | cisco.ios.commands_blocks_equal(result.commands, 'interface') }}"
    - name: Revert back to base configuration using facts round trip
      register: revert
      cisco.ios.ios_l2_interfaces:
        config: "{{ ansible_facts['network_resources']['l2_interfaces'] }}"
        state: overridden

    - ansible.builtin.assert:
        that:
          - revert.commands|length == 7
          - revert.changed == true
          - "{{ revert.commands | cisco.ios.commands_blocks_equal(rtt.commands, 'interface') }}"
  when: ansible_net_version == "15.6(2)T"
  always:
    - ansible.builtin.include_tasks: _remove_config.yaml
