---
- ansible.builtin.debug: msg="START ios_smoke cli/misc_tests.yaml on connection={{ ansible_connection }}"

# hit network.ios.ios- get_defaults_flag()
- name: Setup
  cisco.ios.ios_config:
    commands:
      - no description
      - shutdown
    parents:
      - interface Loopback999
    match: none

- name: Configure device with defaults included
  cisco.ios.ios_config:
    src: defaults/config.j2
    defaults: true
  register: result

- ansible.builtin.debug:
    msg: "{{ ansible_command_timeout }}"
  register: default_timeout

#setting timeout to 1 for immediate task to reflect in persistent connection
- ansible.builtin.set_fact:
    ansible_command_timeout: 1

- name: Run IOS commands to test command_timeout
  cisco.ios.ios_command:
    commands:
      - show running-config all
      - show interfaces
      - show running-config all
  vars:
    ansible_buffer_read_timeout: 2
  ignore_errors: true
  register: result
  when: ansible_connection == 'ansible.netcommon.network_cli'

#setting back timeout back to default
- ansible.builtin.set_fact:
    ansible_command_timeout: "{{ default_timeout.msg }}"

- ansible.builtin.debug:
    msg: "Timeout set back to original value: {{ ansible_command_timeout }}"

- ansible.builtin.assert:
    that:
      - "result.failed == true"
      - "'timeout value is 1 secs' in result.msg"
  when: ansible_connection == 'ansible.netcommon.network_cli'

- name: Reset ssh connection to allow user changes to affect 'current login user'
  ansible.builtin.meta: reset_connection

- ansible.builtin.debug: msg="END ios_smoke cli/misc_tests.yaml on connection={{ ansible_connection }}"
