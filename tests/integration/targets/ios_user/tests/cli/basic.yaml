---
- name: Tear down old users if they exist (setup)
  become: true
  cisco.ios.ios_user:
    aggregate:
      - name: ansibletest1
      - name: ansibletest2
      - name: ansibletest3
      - name: ansibletest4
      - name: ansibletest5
      - name: ansibletest6
    state: absent

- name: Create user (setup)
  become: true
  register: result
  cisco.ios.ios_user:
    name: ansibletest1
    privilege: 15
    role: network-operator
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - result.commands == ["username ansibletest1 view network-operator", "username ansibletest1 privilege 15"]

- name: Collection of users (setup)
  become: true
  register: result
  cisco.ios.ios_user:
    aggregate:
      - name: ansibletest2
      - name: ansibletest3
    state: present
    view: network-admin

- ansible.builtin.assert:
    that:
      - result.changed == true
      - result.commands == ["username ansibletest2 view network-admin", "username ansibletest3 view network-admin"]

- name: Add user again (idempotent)
  become: true
  register: result
  cisco.ios.ios_user:
    name: ansibletest1
    privilege: 15
    role: network-operator
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == false
      - result.commands | length == 0

- name: Add collection of users again (idempotent)
  become: true
  register: result
  cisco.ios.ios_user:
    aggregate:
      - name: ansibletest2
      - name: ansibletest3
    state: present
    view: network-admin

- ansible.builtin.assert:
    that:
      - result.changed == false
      - result.commands | length == 0

- name: Create user with password_type (password)
  become: true
  register: result
  cisco.ios.ios_user:
    name: ansibleuser4
    password_type: password
    configured_password: testpass
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "'username ansibleuser4 password' in result.commands[0]"

- name: Create user with password_type (secret)
  become: true
  register: result
  cisco.ios.ios_user:
    name: ansibleuser5
    password_type: secret
    configured_password: testpass
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "'username ansibleuser5 secret' in result.commands[0]"

- name: Create user with hashed_password
  become: true
  register: result
  cisco.ios.ios_user:
    name: ansibleuser6
    hashed_password:
      type: 5
      value: $1$SpMm$eALjeyED.WSZs0naLNv22/
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "'username ansibleuser6 secret' in result.commands[0]"

- name: Teardown
  become: true
  register: result
  cisco.ios.ios_user:
    aggregate:
      - name: ansibletest1
      - name: ansibletest2
      - name: ansibletest3
      - name: ansibleuser4
      - name: ansibleuser5
      - name: ansibleuser6
      - name: ansibleuser7
      - name: ssh_user
    state: absent

- ansible.builtin.assert:
    that:
      - result.changed == true
      - '"no username ansibletest1" in result.commands[0]["command"]'
      - '"no username ansibletest2" in result.commands[1]["command"]'
      - '"no username ansibletest3" in result.commands[2]["command"]'

- name: Add user to check purge
  become: true
  register: result
  cisco.ios.ios_user:
    name: ansibletest1
    privilege: 15
    role: network-operator
    state: present

- name: Create user with hashed_password 9
  become: true
  register: result
  cisco.ios.ios_user:
    name: ansibleuser6
    hashed_password:
      type: 9
      value: $9$B/6NVV7joWJ9w.$XueHQxIOZk0GhNC3lxUFioUeowJrtLmXxouXfTuoNpc
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "'username ansibleuser6 secret' in result.commands[0]"

- name: Ensure SSH keys are not world readable
  ansible.builtin.file:
    path: "{{ item }}"
    mode: 384
  loop:
    - "{{ role_path }}/files/test_rsa"
    - "{{ role_path }}/files/test_rsa2"
    - "{{ role_path }}/files/test_rsa3"

- name: Create user with sshkey to check user deletion
  cisco.ios.ios_user:
    name: ssh_user
    privilege: 15
    state: present
    sshkey: "{{ lookup('file', 'files/test_rsa.pub') }}"

- name: Reset connection with {{ ansible_user }}
  ansible.builtin.meta: reset_connection

- name: check if purge removes ssh_user
  become: true
  register: result_purge
  cisco.ios.ios_user:
    aggregate:
      - name: "{{ ansible_user }}"
    purge: true

- ansible.builtin.assert:
    that:
      - result.changed == true

# SSH Key Purge Test Cases
- name: Ensure purge_keys_user(s) does not exist
  become: true
  cisco.ios.ios_user:
    aggregate:
      - name: purge_keys_user
      - name: purge_keys_user2
    state: absent

- name: Create user with multiple SSH keys for purge_keys, no purge occurs as the user does not exist
  become: true
  register: result
  cisco.ios.ios_user:
    name: purge_keys_user
    sshkey:
      - "{{ lookup('file', 'files/test_rsa.pub') }}"
      - "{{ lookup('file', 'files/test_rsa2.pub') }}"
    purge_keys: true
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "'no key-hash' not in result.commands | string"

- name: Repeat the same task again to ensure no key is added (idempotency)
  become: true
  register: result
  cisco.ios.ios_user:
    name: purge_keys_user
    sshkey:
      - "{{ lookup('file', 'files/test_rsa.pub') }}"
      - "{{ lookup('file', 'files/test_rsa2.pub') }}"
    purge_keys: true
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == false

- name: Update user with purge_keys false (addtion commands will be shown but nothing happens due to max limit)
  become: true
  register: result
  cisco.ios.ios_user:
    name: purge_keys_user
    sshkey:
      - "{{ lookup('file', 'files/test_rsa3.pub') }}"
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "'no key-hash' not in result.commands | string"
      - "'key-hash' in result.commands | string"

- name: Update user with purge_keys true (should remove unlisted keys)
  become: true
  register: result
  cisco.ios.ios_user:
    name: purge_keys_user
    sshkey:
      - "{{ lookup('file', 'files/test_rsa3.pub') }}"
    purge_keys: true
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "(result.commands | string).count('no key-hash') == 2"
      - "'key-hash' in result.commands | string"

- name: Update user with purge_keys (idempotency)
  become: true
  register: result
  cisco.ios.ios_user:
    name: purge_keys_user
    sshkey:
      - "{{ lookup('file', 'files/test_rsa3.pub') }}"
    purge_keys: true
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == false

- name: Add another key to the user (Should not remove any, should add another key)
  become: true
  register: result
  cisco.ios.ios_user:
    name: purge_keys_user
    sshkey:
      - "{{ lookup('file', 'files/test_rsa3.pub') }}"
      - "{{ lookup('file', 'files/test_rsa2.pub') }}"
    purge_keys: true
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "'no key-hash' not in result.commands | string"
      - "'key-hash' in result.commands | string"

- name: Add more than 2 keys to the user, failure scenario
  become: true
  register: result
  cisco.ios.ios_user:
    name: purge_keys_user
    sshkey:
      - "{{ lookup('file', 'files/test_rsa3.pub') }}"
      - "{{ lookup('file', 'files/test_rsa2.pub') }}"
      - "{{ lookup('file', 'files/test_rsa.pub') }}"
    purge_keys: true
    state: present
  ignore_errors: true

- ansible.builtin.assert:
    that:
      - result.failed == true
      - "'The length limit for ssh-keys is 2' in result.msg | string"

- name: Verify aggregate behavior (Should not remove any for user1, should just add keys for user2)
  become: true
  register: result
  cisco.ios.ios_user:
    aggregate:
      - name: purge_keys_user
      - name: purge_keys_user2
    sshkey:
      - "{{ lookup('file', 'files/test_rsa3.pub') }}"
      - "{{ lookup('file', 'files/test_rsa2.pub') }}"
    purge_keys: true
    state: present

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "(result.commands | string).count('key-hash') == 2"

- name: Teardown purge_keys_user(s) (Ensure purge_keys does not come into effect)
  become: true
  register: result
  cisco.ios.ios_user:
    aggregate:
      - name: purge_keys_user
      - name: purge_keys_user2
    sshkey:
      - "{{ lookup('file', 'files/test_rsa3.pub') }}"
    purge_keys: true
    state: absent

- ansible.builtin.assert:
    that:
      - result.changed == true
      - "'no key-hash' not in result.commands | string"
      - "'key-hash' not in result.commands | string"

- name: Teardown purge_keys_user(s)
  register: result
  become: true
  cisco.ios.ios_user:
    aggregate:
      - name: purge_keys_user
      - name: purge_keys_user2
    state: absent

- ansible.builtin.assert:
    that:
      - result.changed == false
