---
- ansible.builtin.debug:
    msg: START Merged ios_vrf_interfaces ip_vrf_name state for integration tests on connection={{ ansible_connection }}

- ansible.builtin.include_tasks: _remove_config.yaml

- block:
    - name: Configure vrf legacy
      cisco.ios.ios_config:
        lines:
          - vrf definition vrf_legacy
      retries: 2
      delay: 10

    - name: Merge provided ip_vrf_name configuration with device configuration
      register: result
      cisco.ios.ios_vrf_interfaces: &id001
        config:
          - name: GigabitEthernet1
          - name: GigabitEthernet2
          - name: GigabitEthernet3
            ip_vrf_name: vrf_legacy
          - name: GigabitEthernet4
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - "{{ merged_ip_vrf['commands'] | symmetric_difference(result['commands']) | length == 0 }}"

    - name: Assert that before dicts are correctly generated
      ansible.builtin.assert:
        that:
          - "{{ merged_ip_vrf['before'] | symmetric_difference(result['before']) | length == 0 }}"

    - name: Assert that after dict is correctly generated
      ansible.builtin.assert:
        that:
          - "{{ merged_ip_vrf['after'] | symmetric_difference(result['after']) | length == 0 }}"

    - name: Merge provided ip_vrf_name configuration with device configuration (idempotent)
      register: result
      cisco.ios.ios_vrf_interfaces: *id001

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result['changed'] == false

  always:
    - ansible.builtin.include_tasks: _remove_config.yaml
